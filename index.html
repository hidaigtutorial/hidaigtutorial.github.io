<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Memory Hive</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.21.0.js"></script>
<script src="https://cdn.jsdelivr.net/npm/agora-rtm-sdk@2.2.2/agora-rtm.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  darkMode:"class",
  theme:{ extend:{
    colors:{
      "primary":"#97a9ff","primary-container":"#859aff","on-primary":"#002283",
      "secondary":"#c57eff","secondary-container":"#6a0baa","on-secondary":"#340058",
      "tertiary":"#ffe484","tertiary-container":"#fdd404","on-tertiary":"#635200",
      "error":"#ff6e84","error-container":"#a70138",
      "surface":"#0e0e10","surface-bright":"#2c2c2f",
      "surface-container":"#19191c","surface-container-low":"#131315",
      "surface-container-high":"#1f1f22","surface-container-highest":"#262528",
      "on-surface":"#f6f3f5","on-surface-variant":"#acaaad",
      "background":"#0e0e10","outline":"#767577","outline-variant":"#48474a",
    },
    fontFamily:{"headline":["Plus Jakarta Sans","sans-serif"],"body":["Space Grotesk","sans-serif"]},
    borderRadius:{DEFAULT:"0.75rem",lg:"1.25rem",xl:"2rem",full:"9999px"},
  }}
}
</script>
<style>
*{box-sizing:border-box}
body{font-family:'Space Grotesk',sans-serif}
.ms{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24}
.ms-fill{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24}

/* ── Card flip ── */
.card-scene{perspective:700px;position:absolute;cursor:pointer}
.card-inner{
  position:relative;width:100%;height:100%;
  transform-style:preserve-3d;
  transition:transform 0.5s cubic-bezier(0.4,0,0.2,1);
}
.card-inner.flipped{transform:rotateY(180deg)}
.card-front,.card-back{
  position:absolute;inset:0;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  border-radius:0.6rem;overflow:hidden;
}
.card-front{background:#1f1f22;border:1px solid rgba(151,169,255,0.12);transition:border-color 0.2s}
.card-scene:hover .card-front{border-color:rgba(151,169,255,0.45)}
.card-back{transform:rotateY(180deg);background:#000}
.card-matched .card-back{box-shadow:0 0 16px rgba(151,169,255,0.5),inset 0 0 12px rgba(151,169,255,0.08)}
.card-matched .card-inner{animation:matchBurst 0.4s ease}
@keyframes matchBurst{0%{transform:rotateY(180deg) scale(1)}50%{transform:rotateY(180deg) scale(1.08)}100%{transform:rotateY(180deg) scale(1)}}

/* Card pending (guest waiting for host confirm) */
.card-pending .card-front{border-color:rgba(255,228,132,0.6);animation:pendingPulse 0.6s ease infinite alternate}
@keyframes pendingPulse{from{box-shadow:none}to{box-shadow:0 0 10px rgba(255,228,132,0.35)}}

/* ── Turn timer countdown bar (change #3) ── */
#turn-countdown{height:3px;background:rgba(253,212,4,0.2);border-radius:9999px;overflow:hidden;margin-top:3px;width:100%}
#turn-countdown-bar{height:100%;background:#fdd404;width:100%}

/* ── Turn banner ── */
.turn-pulse{animation:pulseGlow 2s ease-in-out infinite}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 6px rgba(253,212,4,0.2)}50%{box-shadow:0 0 22px rgba(253,212,4,0.55),0 0 44px rgba(253,212,4,0.15)}}

/* ── Animations ── */
.slide-up{animation:slideUp 0.45s ease forwards}
.fade-in{animation:fadeIn 0.35s ease forwards}
@keyframes slideUp{0%{transform:translateY(24px);opacity:0}100%{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.score-bump{animation:scoreBump 0.3s ease}
@keyframes scoreBump{0%{transform:scale(1)}50%{transform:scale(1.28)}100%{transform:scale(1)}}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#48474a;border-radius:9999px}

/* ── Toast ── */
#toast{
  position:fixed;bottom:110px;left:50%;transform:translateX(-50%) translateY(14px);
  background:#262528;border:1px solid #48474a;color:#f6f3f5;
  padding:0.55rem 1.3rem;border-radius:9999px;
  font-weight:600;font-size:0.82rem;opacity:0;
  transition:opacity 0.25s,transform 0.25s;pointer-events:none;z-index:1000;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Chat ── */
#chat-panel{
  position:fixed;right:0;bottom:80px;width:288px;
  background:#131315;border:1px solid #262528;border-radius:1rem 1rem 0 0;
  z-index:60;transform:translateY(100%);transition:transform 0.28s ease;
  max-height:400px;display:flex;flex-direction:column;
}
#chat-panel.open{transform:translateY(0)}

/* ── Screens ── */
#lobby-screen{position:fixed;inset:0;z-index:200;
  background:radial-gradient(ellipse at 28% 18%,rgba(151,169,255,0.11) 0%,transparent 58%),
             radial-gradient(ellipse at 72% 82%,rgba(197,126,255,0.09) 0%,transparent 58%),#0e0e10;
}

/* ── Board ── */
#board{position:relative;will-change:transform}

/* ── Spectator badge ── */
.spec-badge{
  position:absolute;top:2px;right:2px;
  background:rgba(197,126,255,0.88);border-radius:4px;
  font-size:8px;font-weight:700;color:#340058;padding:1px 4px;text-transform:uppercase;
}

/* ── RTM dot ── */
#rtm-dot{width:7px;height:7px;border-radius:50%;background:#48474a;
  display:inline-block;margin-right:4px;vertical-align:middle;transition:background 0.4s}
#rtm-dot.connected{background:#4ade80;box-shadow:0 0 5px rgba(74,222,128,0.55)}
#rtm-dot.connecting{background:#fbbf24;animation:dotPulse 1s infinite}
#rtm-dot.error{background:#f87171}
@keyframes dotPulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* ── Lobby waiting state ── */
#waiting-room{display:none}
#waiting-room.active{display:block}
</style>
</head>
<body class="bg-background text-on-surface overflow-hidden h-screen">

<!-- ════════════════════ LOBBY ════════════════════ -->
<div id="lobby-screen" class="flex items-center justify-center">
  <div class="w-full max-w-md px-6 slide-up">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="text-4xl font-black text-primary italic uppercase tracking-wider font-headline mb-1">🐝 Memory Hive</div>
      <p class="text-on-surface-variant text-sm">Video Memory Game · Meet &amp; Match</p>
    </div>

    <!-- Tabs -->
    <div class="flex bg-surface-container rounded-xl p-1 mb-5">
      <button id="tab-join" onclick="setTab('join')"
        class="flex-1 py-2.5 text-sm font-bold rounded-lg transition-all bg-surface-bright text-on-surface">Join Room</button>
      <button id="tab-create" onclick="setTab('create')"
        class="flex-1 py-2.5 text-sm font-bold rounded-lg transition-all text-on-surface-variant">Create Room</button>
    </div>

    <!-- JOIN -->
    <div id="form-join" class="space-y-3">
      <div>
        <label class="text-xs uppercase tracking-widest text-on-surface-variant font-bold block mb-1">Your Name</label>
        <input id="join-name" type="text" placeholder="e.g. Alex M."
          class="w-full bg-surface-container border border-outline-variant rounded-xl px-4 py-3 text-on-surface focus:outline-none focus:border-primary transition-colors"/>
      </div>
      <div>
        <label class="text-xs uppercase tracking-widest text-on-surface-variant font-bold block mb-1">Room Code</label>
        <input id="join-room" type="text" placeholder="e.g. HIVE-ONE"
          class="w-full bg-surface-container border border-outline-variant rounded-xl px-4 py-3 text-on-surface focus:outline-none focus:border-primary transition-colors uppercase"/>
      </div>
      <div>
        <label class="text-xs uppercase tracking-widest text-on-surface-variant font-bold block mb-1">Agora App ID</label>
        <input id="join-appid" type="text" placeholder="Your Agora App ID"
          class="w-full bg-surface-container border border-outline-variant rounded-xl px-4 py-3 text-on-surface focus:outline-none focus:border-primary transition-colors font-mono text-sm"/>
      </div>
      <div>
        <label class="text-xs uppercase tracking-widest text-on-surface-variant font-bold block mb-1">Token <span class="normal-case opacity-60">(optional)</span></label>
        <input id="join-token" type="text" placeholder="Leave blank if not using token auth"
          class="w-full bg-surface-container border border-outline-variant rounded-xl px-4 py-3 text-on-surface focus:outline-none focus:border-primary transition-colors font-mono text-sm"/>
      </div>
      <button onclick="doJoin()"
        class="w-full py-3.5 bg-gradient-to-r from-primary to-primary-container text-on-primary font-black rounded-xl uppercase tracking-wider text-sm hover:scale-[1.02] active:scale-[0.98] transition-transform mt-1">
        🐝 Join Game
      </button>
    </div>

    <!-- CREATE -->
    <div id="form-create" class="space-y-3 hidden">
      <div>
        <label class="text-xs uppercase tracking-widest text-on-surface-variant font-bold block mb-1">Your Name</label>
        <input id="create-name" type="text" placeholder="e.g. Host Alex"
          class="w-full bg-surface-container border border-outline-variant rounded-xl px-4 py-3 text-on-surface focus:outline-none focus:border-primary transition-colors"/>
      </div>
      <div>
        <label class="text-xs uppercase tracking-widest text-on-surface-variant font-bold block mb-1">Room Name</label>
        <input id="create-room" type="text" placeholder="e.g. HIVE-ONE"
          class="w-full bg-surface-container border border-outline-variant rounded-xl px-4 py-3 text-on-surface focus:outline-none focus:border-primary transition-colors uppercase"/>
      </div>
      <div>
        <label class="text-xs uppercase tracking-widest text-on-surface-variant font-bold block mb-1">Agora App ID</label>
        <input id="create-appid" type="text" placeholder="Your Agora App ID"
          class="w-full bg-surface-container border border-outline-variant rounded-xl px-4 py-3 text-on-surface focus:outline-none focus:border-primary transition-colors font-mono text-sm"/>
      </div>
      <div>
        <label class="text-xs uppercase tracking-widest text-on-surface-variant font-bold block mb-1">Token <span class="normal-case opacity-60">(optional)</span></label>
        <input id="create-token" type="text" placeholder="Leave blank if not using token auth"
          class="w-full bg-surface-container border border-outline-variant rounded-xl px-4 py-3 text-on-surface focus:outline-none focus:border-primary transition-colors font-mono text-sm"/>
      </div>
      <div>
        <label class="text-xs uppercase tracking-widest text-on-surface-variant font-bold block mb-1">Max Video Players</label>
        <div class="flex gap-3">
          <button id="btn-max10" onclick="setMax(10)"
            class="flex-1 py-2.5 rounded-xl text-sm font-bold border-2 border-primary bg-primary/10 text-primary transition-all">10 Players</button>
          <button id="btn-max20" onclick="setMax(20)"
            class="flex-1 py-2.5 rounded-xl text-sm font-bold border-2 border-outline-variant text-on-surface-variant hover:border-primary hover:text-primary transition-all">20 Players</button>
        </div>
      </div>
      <button onclick="doCreate()"
        class="w-full py-3.5 bg-gradient-to-r from-secondary to-secondary-container text-white font-black rounded-xl uppercase tracking-wider text-sm hover:scale-[1.02] active:scale-[0.98] transition-transform mt-1">
        🐝 Create Room
      </button>
    </div>

    <p class="text-center text-xs text-on-surface-variant mt-5 opacity-50">Requires Agora App ID · Synced via Agora RTM</p>
  </div>
</div>

<!-- ════════════════════ WAITING ROOM (host pre-game lobby) ════════════════════ -->
<div id="waiting-screen" class="hidden fixed inset-0 z-150 bg-background flex items-center justify-center">
  <div class="w-full max-w-sm px-6 text-center slide-up">
    <div class="text-4xl mb-4">🐝</div>
    <h2 class="font-headline font-black text-2xl text-primary uppercase mb-2">Room Ready</h2>
    <div class="bg-surface-container rounded-xl px-5 py-3 mb-4 font-mono text-primary font-bold text-lg" id="waiting-room-code"></div>
    <p class="text-on-surface-variant text-sm mb-6">Share the invite link, then start when everyone's in.</p>
    <div id="waiting-players" class="space-y-2 mb-6 text-left max-h-48 overflow-y-auto"></div>
    <div class="flex gap-3">
      <button onclick="copyInvite()" class="flex-1 py-2.5 bg-primary/10 border border-primary/30 rounded-xl text-primary text-sm font-bold hover:bg-primary/20 transition-colors">🔗 Copy Invite</button>
      <button id="start-btn" onclick="hostStartGame()"
        class="flex-1 py-2.5 bg-gradient-to-r from-primary to-primary-container text-on-primary font-black rounded-xl text-sm uppercase tracking-wide hover:scale-[1.02] active:scale-[0.98] transition-transform">
        Start Game
      </button>
    </div>
    <button onclick="cancelWaiting()" class="mt-3 text-xs text-on-surface-variant hover:text-error transition-colors">Cancel &amp; leave</button>
  </div>
</div>

<!-- ════════════════════ GAME SCREEN ════════════════════ -->
<div id="game-screen" class="hidden h-screen flex flex-col">

  <!-- Top bar -->
  <header class="flex justify-between items-center px-5 py-3 bg-surface/80 backdrop-blur-xl border-b border-outline-variant/30 z-50 flex-shrink-0">
    <div class="flex items-center gap-2">
      <span class="text-lg font-black text-primary italic font-headline">🐝 MH</span>
      <span id="rtm-dot" title="RTM"></span>
    </div>
    <nav class="flex items-center gap-4">
      <div class="text-xs font-bold uppercase tracking-widest text-primary border-b border-primary pb-0.5 font-headline" id="header-room">—</div>
      <div class="text-xs text-on-surface-variant font-bold" id="header-timer">00:00</div>
      <div class="text-xs text-tertiary font-black" id="header-score">0 pairs</div>
    </nav>
    <div class="flex items-center gap-1">
      <button onclick="toggleSidebar()" class="text-primary hover:bg-surface-container-high rounded-full p-1.5 transition-all"><span class="material-symbols-outlined ms text-xl">leaderboard</span></button>
      <button onclick="leaveRoom()" class="text-error hover:bg-error-container/20 rounded-full p-1.5 transition-all"><span class="material-symbols-outlined ms-fill text-xl">call_end</span></button>
    </div>
  </header>

  <main class="flex flex-1 overflow-hidden">

    <!-- Board area -->
    <section class="flex-1 flex flex-col overflow-hidden px-4 py-3">

      <!-- Turn banner -->
      <div id="turn-banner" class="mb-3 rounded-xl px-4 py-2.5 flex flex-wrap items-center justify-between bg-tertiary-container text-on-tertiary flex-shrink-0 turn-pulse">
        <div class="flex items-center gap-2.5">
          <span class="material-symbols-outlined ms-fill text-xl">stars</span>
          <div>
            <div id="turn-text" class="font-headline font-black text-sm uppercase tracking-tight">Waiting…</div>
            <div id="turn-sub" class="text-xs font-semibold opacity-70">—</div>
          </div>
        </div>
        <div id="cards-left" class="text-xs font-bold opacity-70"></div>
      </div>
      <div id="turn-countdown" class="hidden w-full px-1 pb-1">
        <div id="turn-countdown-bar"></div>
      </div>

      <!-- Hive board -->
      <div class="flex-1 overflow-auto relative" id="board-wrapper">
        <div id="board"></div>
      </div>
    </section>

    <!-- Sidebar -->
    <aside id="sidebar" class="w-60 flex-shrink-0 bg-surface-container-low border-l border-outline-variant/30 flex flex-col overflow-hidden transition-all duration-300">
      <div class="flex border-b border-outline-variant/30">
        <button onclick="showPanel('scores')" id="sp-s-btn"
          class="flex-1 py-2.5 text-xs font-bold uppercase tracking-widest text-primary border-b-2 border-primary">Scores</button>
        <button onclick="showPanel('players')" id="sp-p-btn"
          class="flex-1 py-2.5 text-xs font-bold uppercase tracking-widest text-on-surface-variant">Players</button>
      </div>
      <div id="sp-scores" class="flex-1 overflow-y-auto p-3 space-y-1"></div>
      <div id="sp-players" class="flex-1 overflow-y-auto p-3 space-y-2 hidden"></div>
      <div class="p-3 border-t border-outline-variant/30">
        <button onclick="copyInvite()" class="w-full py-2 bg-primary/10 border border-primary/30 rounded-xl text-primary text-xs font-bold uppercase tracking-wider hover:bg-primary/20 transition-colors">
          🔗 Copy Invite
        </button>
      </div>
    </aside>
  </main>

  <!-- Bottom controls -->
  <nav class="flex-shrink-0 flex justify-center items-center py-3 bg-surface/80 backdrop-blur-xl border-t border-outline-variant/30">
    <div class="flex items-center gap-2">
      <button id="btn-mic" onclick="toggleMic()" class="flex flex-col items-center p-2.5 rounded-xl hover:bg-surface-container-high transition-all text-on-surface">
        <span id="mic-icon" class="material-symbols-outlined ms text-xl">mic</span>
        <span class="text-[9px] font-bold uppercase mt-0.5">Mic</span>
      </button>
      <button id="btn-cam" onclick="toggleCamera()" class="flex flex-col items-center p-2.5 rounded-xl hover:bg-surface-container-high transition-all text-on-surface">
        <span id="cam-icon" class="material-symbols-outlined ms text-xl">videocam</span>
        <span class="text-[9px] font-bold uppercase mt-0.5">Camera</span>
      </button>
      <button onclick="toggleChat()" class="flex flex-col items-center p-2.5 rounded-xl bg-primary/10 border border-primary/30 text-primary">
        <span class="material-symbols-outlined ms-fill text-xl">chat_bubble</span>
        <span class="text-[9px] font-bold uppercase mt-0.5">Chat</span>
      </button>
      <button onclick="toggleSidebar()" class="flex flex-col items-center p-2.5 rounded-xl hover:bg-surface-container-high transition-all text-on-surface">
        <span class="material-symbols-outlined ms text-xl">groups</span>
        <span class="text-[9px] font-bold uppercase mt-0.5">Players</span>
      </button>
      <button onclick="leaveRoom()" class="flex flex-col items-center p-2.5 rounded-xl hover:bg-error-container/20 text-error">
        <span class="material-symbols-outlined ms-fill text-xl">call_end</span>
        <span class="text-[9px] font-bold uppercase mt-0.5">Leave</span>
      </button>
    </div>
  </nav>
</div>

<!-- Chat panel -->
<div id="chat-panel">
  <div class="flex items-center justify-between px-4 py-3 border-b border-outline-variant/30">
    <span class="font-bold text-sm">Chat</span>
    <button onclick="toggleChat()" class="text-on-surface-variant hover:text-on-surface"><span class="material-symbols-outlined ms text-lg">close</span></button>
  </div>
  <div id="chat-messages" class="flex-1 overflow-y-auto p-3 space-y-2 text-sm" style="min-height:180px;max-height:250px;"></div>
  <div class="p-3 border-t border-outline-variant/30 flex gap-2">
    <input id="chat-input" type="text" placeholder="Say something…"
      class="flex-1 bg-surface-container border border-outline-variant rounded-xl px-3 py-2 text-sm text-on-surface focus:outline-none focus:border-primary"
      onkeypress="if(event.key==='Enter')sendChat()"/>
    <button onclick="sendChat()" class="bg-primary text-on-primary rounded-xl px-3 py-2 text-xs font-bold">Send</button>
  </div>
</div>

<div id="toast"></div>
<div class="fixed top-1/3 -left-24 w-48 h-48 bg-primary/6 blur-[100px] rounded-full pointer-events-none z-0"></div>
<div class="fixed bottom-0 -right-16 w-64 h-64 bg-secondary/6 blur-[110px] rounded-full pointer-events-none z-0"></div>

<script>
// ══════════════════════════════════════════════════════════════════
//  CONSTANTS & STATE
// ══════════════════════════════════════════════════════════════════
const PH = [
  `<svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"><rect width="60" height="60" fill="#1f1f22"/><circle cx="30" cy="22" r="12" fill="#48474a"/><ellipse cx="30" cy="50" rx="18" ry="12" fill="#48474a"/><text x="30" y="27" text-anchor="middle" fill="#acaaad" font-size="13" font-family="monospace">?</text></svg>`,
  `<svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"><rect width="60" height="60" fill="#19191c"/><circle cx="30" cy="22" r="12" fill="#3e65ff" opacity="0.5"/><ellipse cx="30" cy="50" rx="18" ry="12" fill="#3e65ff" opacity="0.3"/><text x="30" y="27" text-anchor="middle" fill="#97a9ff" font-size="11" font-family="monospace">★</text></svg>`,
  `<svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"><rect width="60" height="60" fill="#131315"/><circle cx="30" cy="22" r="12" fill="#6a0baa" opacity="0.6"/><ellipse cx="30" cy="50" rx="18" ry="12" fill="#6a0baa" opacity="0.4"/><text x="30" y="27" text-anchor="middle" fill="#c57eff" font-size="11" font-family="monospace">◆</text></svg>`,
  `<svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"><rect width="60" height="60" fill="#1a1508"/><circle cx="30" cy="22" r="12" fill="#635200" opacity="0.7"/><ellipse cx="30" cy="50" rx="18" ry="12" fill="#635200" opacity="0.5"/><text x="30" y="27" text-anchor="middle" fill="#ffe484" font-size="11" font-family="monospace">🐝</text></svg>`,
  `<svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"><rect width="60" height="60" fill="#1a0a0c"/><circle cx="30" cy="22" r="12" fill="#a70138" opacity="0.6"/><ellipse cx="30" cy="50" rx="18" ry="12" fill="#a70138" opacity="0.4"/><text x="30" y="27" text-anchor="middle" fill="#ff6e84" font-size="11" font-family="monospace">✦</text></svg>`,
];

// Single source of truth
const S = {
  // Config
  appId:'', token:'', channelName:'', userName:'', maxVideoPlayers:10,
  isHost:false, boardSeed:0, gameStarted:false,

  // Agora RTC
  rtcClient:null, localAudio:null, localVideo:null, remoteUsers:{},
  micOn:true, camOn:true,

  // Agora RTM
  rtmClient:null, rtmChannelName:'', myUid:'',

  // Participants: only NON-spectator, NON-placeholder humans in turn order
  players:[],      // [{uid,name}]  — active video players (turn order)
  spectators:[],   // [{uid,name}]  — over-limit joiners
  allUsers:[],     // [{uid,name,isSpectator}] for sidebar

  // Board
  cards:[],        // [{id,pairId,participantUid,isPlaceholder,name,flipped,matched}]
  positions:[],    // [{x,y,w,h,rot}] same seed = same layout everywhere
  pendingIdx:-1,   // card index guest is waiting host to confirm (for pending CSS)

  // Game flow
  flipped:[],      // max 2 indices currently face-up & unmatched
  turnIdx:0,       // index into players[]
  scores:{},       // uid -> {name, pairs}
  canFlip:false,
  flipLock:false,
  noMatchTimer:null, turnTimer:null,

  // Timer
  timerStart:null, timerInterval:null,
};

// ══════════════════════════════════════════════════════════════════
//  SEEDED RNG  (mulberry32)
// ══════════════════════════════════════════════════════════════════
function mkRng(seed) {
  let s = seed >>> 0;
  return () => {
    s = (s + 0x6D2B79F5) >>> 0;
    let t = Math.imul(s ^ s >>> 15, 1 | s);
    t = (t + Math.imul(t ^ t >>> 7, 61 | t)) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function seededShuffle(arr, rng) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

// ══════════════════════════════════════════════════════════════════
//  LOBBY UI
// ══════════════════════════════════════════════════════════════════
let selectedMax = 10;

function setTab(t) {
  const active   = 'flex-1 py-2.5 text-sm font-bold rounded-lg transition-all bg-surface-bright text-on-surface';
  const inactive = 'flex-1 py-2.5 text-sm font-bold rounded-lg transition-all text-on-surface-variant';
  g('tab-join').className   = t==='join'   ? active : inactive;
  g('tab-create').className = t==='create' ? active : inactive;
  g('form-join').classList.toggle('hidden', t!=='join');
  g('form-create').classList.toggle('hidden', t!=='create');
}

function setMax(n) {
  selectedMax = n;
  const on  = 'flex-1 py-2.5 rounded-xl text-sm font-bold border-2 border-primary bg-primary/10 text-primary transition-all';
  const off = 'flex-1 py-2.5 rounded-xl text-sm font-bold border-2 border-outline-variant text-on-surface-variant hover:border-primary hover:text-primary transition-all';
  g('btn-max10').className = n===10 ? on : off;
  g('btn-max20').className = n===20 ? on : off;
}

async function doJoin() {
  const name  = g('join-name').value.trim();
  const room  = g('join-room').value.trim().toUpperCase();
  const appId = g('join-appid').value.trim();
  const token = g('join-token').value.trim();
  if (!name)  return toast('Enter your name');
  if (!room)  return toast('Enter a room code');
  if (!appId) return toast('Enter your Agora App ID');
  await connect(name, room, appId, token||'', 10, false);
}

async function doCreate() {
  const name  = g('create-name').value.trim();
  const room  = g('create-room').value.trim().toUpperCase();
  const appId = g('create-appid').value.trim();
  const token = g('create-token').value.trim();
  if (!name)  return toast('Enter your name');
  if (!room)  return toast('Enter a room name');
  if (!appId) return toast('Enter your Agora App ID');
  await connect(name, room, appId, token||'', selectedMax, true);
}

// ══════════════════════════════════════════════════════════════════
//  CONNECTION — RTC + RTM
// ══════════════════════════════════════════════════════════════════
async function connect(userName, channelName, appId, token, maxPlayers, asHost) {
  Object.assign(S, {
    appId, token, channelName, userName, maxVideoPlayers: maxPlayers,
    isHost: asHost, gameStarted: false, boardSeed: 0,
    players:[], spectators:[], allUsers:[],
    cards:[], positions:[], flipped:[], turnIdx:0,
    scores:{}, canFlip:false, flipLock:false, pendingIdx:-1,
  });

  toast('Connecting…'); rtmDot('connecting');

  // ── Step 1: Request camera/mic — handle failure gracefully ──────
  try {
    [S.localAudio, S.localVideo] = await AgoraRTC.createMicrophoneAndCameraTracks();
  } catch (permErr) {
    console.warn('Camera/mic error:', permErr);
    toast('⚠️ Camera/mic unavailable — joining audio-only');
    try { S.localAudio = await AgoraRTC.createMicrophoneAudioTrack(); } catch(e) {}
  }

  // ── Step 2: RTC join ───────────────────────────────────────────
  try {
    S.rtcClient = AgoraRTC.createClient({ mode:'rtc', codec:'vp8' });
    setupRtcEvents();
    const uid = await S.rtcClient.join(appId, channelName, token||null, null);
    S.myUid = String(uid);

    const tracks = [S.localAudio, S.localVideo].filter(Boolean);
    if (tracks.length) await S.rtcClient.publish(tracks);

    // ── Step 3: RTM join ─────────────────────────────────────────
    const { RTM } = AgoraRTM;
    S.rtmClient = new RTM(appId, S.myUid, { token: token||undefined });
    setupRtmEvents();
    await S.rtmClient.login();
    await S.rtmClient.subscribe(channelName);
    S.rtmChannelName = channelName;
    rtmDot('connected');

    // Register self in role lists
    if (asHost) {
      S.players.push({ uid: S.myUid, name: userName });
      S.allUsers.push({ uid: S.myUid, name: userName, isSpectator: false });
      S.scores[S.myUid] = { name: userName, pairs: 0 };
    }

    // Announce to channel
    broadcast({ type:'HELLO', uid:S.myUid, name:userName });

    if (asHost) {
      // Host goes to waiting room
      showScreen('waiting');
      g('waiting-room-code').textContent = channelName;
      refreshWaitingList();
    } else {
      // Guest: request current state, show game screen immediately
      showScreen('game');
      g('header-room').textContent = channelName;
      startTimer();
      broadcast({ type:'REQUEST_STATE', uid:S.myUid });
      toast('Joined ' + channelName + '!');
    }

  } catch (err) {
    console.error(err);
    rtmDot('error');
    toast('Error: ' + (err.message || err));
    // Return to lobby if connection fails
    showScreen('lobby');
  }
}

// ══════════════════════════════════════════════════════════════════
//  WAITING ROOM (host only)
// ══════════════════════════════════════════════════════════════════
function refreshWaitingList() {
  const el = g('waiting-players');
  if (!el) return;
  el.innerHTML = S.allUsers.map(u => `
    <div class="flex items-center gap-3 px-3 py-2 rounded-xl bg-surface-container">
      <div class="w-7 h-7 rounded-full bg-primary/20 flex items-center justify-center text-xs text-primary font-bold">${u.name.slice(0,2).toUpperCase()}</div>
      <div class="text-sm font-bold">${u.name}${u.uid===S.myUid?' <span class="text-primary text-xs">(you · host)</span>':''}</div>
      ${u.isSpectator?'<span class="ml-auto text-[9px] text-secondary font-bold uppercase">Spectator</span>':''}
    </div>`).join('');
  const count = S.players.length;
  g('start-btn').textContent = count < 2 ? `Waiting (${count}/2 min)…` : 'Start Game ▶';
  g('start-btn').disabled = count < 2;
  g('start-btn').className = count < 2
    ? 'flex-1 py-2.5 bg-surface-container-high text-on-surface-variant font-black rounded-xl text-sm uppercase tracking-wide cursor-not-allowed'
    : 'flex-1 py-2.5 bg-gradient-to-r from-primary to-primary-container text-on-primary font-black rounded-xl text-sm uppercase tracking-wide hover:scale-[1.02] active:scale-[0.98] transition-transform';
}

function hostStartGame() {
  if (!S.isHost || S.players.length < 2) return;
  S.gameStarted = true;
  S.boardSeed = Date.now(); // full timestamp = better entropy (fix #9)
  S.turnIdx = 0;
  buildBoard();
  showScreen('game');
  g('header-room').textContent = S.channelName;
  startTimer();
  // Broadcast GAME_START so guests know the game is officially on
  broadcast({
    type: 'GAME_START',
    seed: S.boardSeed,
    maxPlayers: S.maxVideoPlayers,
    players: S.players,
    spectators: S.spectators,
  });
  renderBoard();
  updateTurnBanner(); updateScores(); updatePlayersList();
  hostStartTurnTimer();
}

function cancelWaiting() {
  leaveRoom();
}

// ══════════════════════════════════════════════════════════════════
//  RTM MESSAGING
// ══════════════════════════════════════════════════════════════════
function broadcast(obj) {
  if (!S.rtmClient || !S.rtmChannelName) return;
  S.rtmClient.publish(S.rtmChannelName, JSON.stringify(obj), { channelType:'MESSAGE' }).catch(()=>{});
}

// True peer-to-peer using RTM v2 publishPeer
function sendTo(uid, obj) {
  if (!S.rtmClient) return;
  S.rtmClient.publish(String(uid), JSON.stringify(obj), { channelType:'USER' }).catch(()=>{});
}

function setupRtmEvents() {
  S.rtmClient.addEventListener('message', event => {
    if (event.publisher === S.myUid) return; // ignore own echo
    try {
      const msg = JSON.parse(event.message);
      onMsg(msg, event.publisher);
    } catch(e) {}
  });

  S.rtmClient.addEventListener('presence', event => {
    if (event.eventType === 'LEAVE' || event.eventType === 'TIMEOUT') {
      onPeerLeft(event.publisher);
    }
  });

  S.rtmClient.addEventListener('status', event => {
    const map = { CONNECTED:'connected', CONNECTING:'connecting', DISCONNECTED:'error' };
    rtmDot(map[event.state] || 'error');
  });
}

// ══════════════════════════════════════════════════════════════════
//  RTM MESSAGE HANDLER
// ══════════════════════════════════════════════════════════════════
function onMsg(m, from) {
  switch (m.type) {

    // ── Presence ───────────────────────────────────────────────
    case 'HELLO': {
      if (S.allUsers.find(u => u.uid === m.uid)) break;
      const isSpec = S.players.length >= S.maxVideoPlayers;
      const user = { uid: m.uid, name: m.name, isSpectator: isSpec };
      S.allUsers.push(user);
      if (!isSpec) {
        S.players.push({ uid: m.uid, name: m.name });
        S.scores[m.uid] = { name: m.name, pairs: 0 };
      } else {
        S.spectators.push({ uid: m.uid, name: m.name });
      }
      toast(m.name + (isSpec ? ' joined as spectator' : ' joined!'));

      if (S.isHost) {
        refreshWaitingList();
        // Send current state P2P — not exposed to whole channel (fix #2)
        setTimeout(() => sendCurrentStateTo(m.uid), 400);
      }
      if (S.gameStarted) { updatePlayersList(); updateScores(); }
      break;
    }

    case 'REQUEST_STATE': {
      if (S.isHost) sendCurrentStateTo(m.uid);
      break;
    }

    // ── Host → guest: full state snapshot (P2P, not broadcast) ─
    case 'FULL_STATE': {
      applyFullState(m);
      break;
    }

    // ── Host → all: game is starting ───────────────────────────
    case 'GAME_START': {
      if (S.isHost) break;
      S.boardSeed = m.seed;
      S.maxVideoPlayers = m.maxPlayers;
      S.players = m.players;
      S.spectators = m.spectators || [];
      S.allUsers = [
        ...m.players.map(p => ({ ...p, isSpectator:false })),
        ...(m.spectators||[]).map(p => ({ ...p, isSpectator:true })),
      ];
      m.players.forEach(p => { if (!S.scores[p.uid]) S.scores[p.uid] = { name:p.name, pairs:0 }; });
      S.gameStarted = true; S.turnIdx = 0;
      buildBoard();
      showScreen('game');
      g('header-room').textContent = S.channelName;
      startTimer();
      renderBoard();
      S.canFlip = S.myUid === S.players[0]?.uid;
      updateTurnBanner(); updateScores(); updatePlayersList();
      toast('Game started!');
      break;
    }

    // ── Flip flow ───────────────────────────────────────────────
    case 'FLIP_REQUEST': {
      if (!S.isHost || !S.gameStarted) break;
      const cur = S.players[S.turnIdx];
      if (!cur || cur.uid !== m.uid) break;
      if (S.flipLock || S.flipped.length >= 2) break;
      if (S.cards[m.cardIdx]?.flipped || S.cards[m.cardIdx]?.matched) break;
      hostFlip(m.cardIdx);
      break;
    }

    case 'CARD_FLIPPED': {
      if (S.isHost) break; // host already applied locally
      clearPending();
      applyFlip(m.cardIdx);
      break;
    }

    case 'NO_MATCH': {
      if (S.isHost) break;
      applyNoMatch(m.i1, m.i2, m.next);
      break;
    }

    case 'MATCH': {
      if (S.isHost) break;
      applyMatch(m.i1, m.i2, m.scorer, m.next);
      break;
    }

    case 'GAME_OVER': {
      if (!S.isHost) endGame(m.scores);
      break;
    }

    case 'RESET': {
      if (S.isHost) break;
      applyReset(m);
      break;
    }

    case 'TURN_SKIP': {
      if (!S.isHost) applyTurnSkip(m.next);
      break;
    }

    case 'CHAT': {
      appendChat(m.name, m.text, false);
      break;
    }
  }
}

// ══════════════════════════════════════════════════════════════════
//  HOST: send full state to one peer (P2P — fix #2)
// ══════════════════════════════════════════════════════════════════
function sendCurrentStateTo(peerUid) {
  sendTo(peerUid, {
    type: 'FULL_STATE',
    seed: S.boardSeed,
    maxPlayers: S.maxVideoPlayers,
    players: S.players,
    spectators: S.spectators,
    cards: S.cards.map(c => ({
      id:c.id, pairId:c.pairId, participantUid:c.participantUid,
      isPlaceholder:c.isPlaceholder, name:c.name, flipped:c.flipped, matched:c.matched,
    })),
    scores: S.scores,
    turnIdx: S.turnIdx,
    gameStarted: S.gameStarted,
  });
}

function applyFullState(m) {
  S.boardSeed = m.seed; S.maxVideoPlayers = m.maxPlayers;
  S.players = m.players; S.spectators = m.spectators || [];
  S.allUsers = [
    ...m.players.map(p => ({ ...p, isSpectator:false })),
    ...(m.spectators||[]).map(p => ({ ...p, isSpectator:true })),
  ];
  S.scores = m.scores; S.turnIdx = m.turnIdx; S.gameStarted = m.gameStarted;
  S.cards = m.cards; S.flipped = []; S.flipLock = false;
  S.canFlip = S.myUid === S.players[S.turnIdx]?.uid;
  if (S.gameStarted) {
    computeHive();
    renderBoard();
    showScreen('game');
    g('header-room').textContent = S.channelName;
    startTimer();
  }
  updateTurnBanner(); updateScores(); updatePlayersList();
}

// ══════════════════════════════════════════════════════════════════
//  BOARD BUILD (seeded — fix #9: use full timestamp)
// ══════════════════════════════════════════════════════════════════
function buildBoard() {
  const rng = mkRng(S.boardSeed);
  // Only real video players get cards; placeholders fill the rest
  const sources = [...S.players];
  let ph = 0;
  while (sources.length < S.maxVideoPlayers) {
    sources.push({ uid:'ph_'+ph, name:'Guest', isPlaceholder:true });
    ph++;
  }
  let cards = [];
  sources.forEach((src, i) => {
    const base = { pairId:i, participantUid:src.uid, isPlaceholder:!!src.isPlaceholder, name:src.name, flipped:false, matched:false };
    cards.push({ ...base, id: i*2   });
    cards.push({ ...base, id: i*2+1 });
  });
  seededShuffle(cards, rng);
  S.cards = cards;
  S.flipped = []; S.flipLock = false;
  S.canFlip = S.myUid === S.players[S.turnIdx]?.uid;
  computeHive();
}

// ══════════════════════════════════════════════════════════════════
//  HIVE LAYOUT — positions only, no DOM (fix #14)
// ══════════════════════════════════════════════════════════════════
function computeHive() {
  const n = S.cards.length;
  if (!n) return;
  const rng = mkRng(S.boardSeed + 9999);
  const wrap = g('board-wrapper');
  const W = wrap ? (wrap.clientWidth  || 800) : 800;
  const H = wrap ? (wrap.clientHeight || 500) : 500;

  const cols = S.maxVideoPlayers <= 10 ? 6 : 8;
  const cardSz = Math.min(
    Math.floor(W / (cols + 0.9)),
    Math.floor(H / (Math.ceil(n / cols) + 0.9)),
    118
  );
  const gapX = cardSz * 0.15, gapY = cardSz * 0.2;
  const cellW = cardSz + gapX, cellH = cardSz + gapY;
  const rows = Math.ceil(n / cols);
  const ox = Math.max(4, (W - cols * cellW) / 2);
  const oy = Math.max(8, (H - rows * cellH) / 2);

  S.positions = S.cards.map((_, i) => {
    const col = i % cols, row = Math.floor(i / cols);
    const hive = (row % 2) * cellW * 0.48;
    return {
      x: ox + hive + col * cellW + (rng() - 0.5) * cardSz * 0.28,
      y: oy + row  * cellH       + (rng() - 0.5) * cardSz * 0.28,
      w: cardSz, h: cardSz,
      rot: (rng() - 0.5) * 13,
    };
  });

  // Size the board container
  const brd = g('board');
  if (brd) {
    brd.style.width  = Math.max(W, Math.max(...S.positions.map(p => p.x + p.w)) + 20) + 'px';
    brd.style.height = Math.max(H, Math.max(...S.positions.map(p => p.y + p.h)) + 20) + 'px';
  }
}

// ══════════════════════════════════════════════════════════════════
//  RENDER BOARD — full rebuild (called on init and game reset only)
// ══════════════════════════════════════════════════════════════════
function renderBoard() {
  if (!S.positions.length && S.cards.length) computeHive();
  const brd = g('board');
  if (!brd) return;

  // Clean up existing cloned tracks before wiping DOM
  brd.querySelectorAll('video').forEach(v => { if (v._ct) try { v._ct.stop(); } catch(_) {} });
  brd.innerHTML = '';

  S.cards.forEach((card, idx) => {
    const p = S.positions[idx] || { x:0, y:0, w:80, h:80, rot:0 };
    const scene = document.createElement('div');
    scene.className = 'card-scene';
    scene.id = 'card-' + idx;
    scene.style.cssText = `left:${p.x}px;top:${p.y}px;width:${p.w}px;height:${p.h}px;transform:rotate(${p.rot}deg);z-index:1;transition:transform 0.18s`;

    scene.addEventListener('mouseenter', () => {
      scene.style.transform = `rotate(${p.rot}deg) scale(1.07) translateY(-3px)`;
      scene.style.zIndex = '10';
    });
    scene.addEventListener('mouseleave', () => {
      scene.style.transform = `rotate(${p.rot}deg)`;
      scene.style.zIndex = '1';
    });

    const inner = document.createElement('div');
    inner.className = 'card-inner'
      + (card.flipped || card.matched ? ' flipped' : '')
      + (card.matched ? ' card-matched' : '');

    // Front
    const front = document.createElement('div');
    front.className = 'card-front flex items-center justify-center';
    if (!card.matched) front.onclick = () => requestFlip(idx);
    front.innerHTML = `<span class="material-symbols-outlined ms-fill text-primary/20" style="font-size:${Math.max(14, p.w*0.3)}px">electric_bolt</span>`;

    // Back
    const back = document.createElement('div');
    back.className = 'card-back' + (card.matched ? ' border-2 border-primary' : '');
    back.id = 'card-back-' + idx;
    // Name label
    const lbl = document.createElement('div');
    lbl.className = 'absolute bottom-0.5 left-0.5 bg-black/70 px-1 rounded text-white uppercase font-bold z-10';
    lbl.style.fontSize = Math.max(7, p.w * 0.09) + 'px';
    lbl.textContent = card.name.slice(0, 10);
    back.appendChild(lbl);

    inner.appendChild(front);
    inner.appendChild(back);
    scene.appendChild(inner);
    brd.appendChild(scene);
  });

  setTimeout(() => renderAllVideos(), 60);
  updateCardsLeft();
}

// ══════════════════════════════════════════════════════════════════
//  RESIZE — only reposition, don't rebuild DOM (fix #14)
// ══════════════════════════════════════════════════════════════════
function repositionCards() {
  if (!S.cards.length) return;
  computeHive();
  S.cards.forEach((_, idx) => {
    const scene = g('card-' + idx);
    const p = S.positions[idx];
    if (!scene || !p) return;
    scene.style.left   = p.x + 'px';
    scene.style.top    = p.y + 'px';
    scene.style.width  = p.w + 'px';
    scene.style.height = p.h + 'px';
    scene.style.transform = `rotate(${p.rot}deg)`;
    // Update bolt icon size
    const bolt = scene.querySelector('.ms-fill');
    if (bolt) bolt.style.fontSize = Math.max(14, p.w*0.3) + 'px';
    // Update label size
    const lbl = scene.querySelector('.absolute');
    if (lbl) lbl.style.fontSize = Math.max(7, p.w*0.09) + 'px';
  });
}

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(repositionCards, 220);
});

// ══════════════════════════════════════════════════════════════════
//  VIDEO — cloned tracks, per-card (fix #5: only update changed cards)
// ══════════════════════════════════════════════════════════════════
function playTrack(agoraTrack, container) {
  const raw = agoraTrack.getMediaStreamTrack ? agoraTrack.getMediaStreamTrack() : null;
  const v = document.createElement('video');
  v.autoplay = true; v.muted = true; v.playsInline = true;
  v.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;';
  if (raw) { const cl = raw.clone(); v.srcObject = new MediaStream([cl]); v._ct = cl; }
  container.appendChild(v);
  v.play().catch(() => {});
}

function renderVideoForCard(card, back) {
  // Stop old cloned tracks
  back.querySelectorAll('video').forEach(v => { if (v._ct) try { v._ct.stop(); } catch(_) {} });
  back.querySelectorAll('.cvw').forEach(el => el.remove());

  const wrap = document.createElement('div');
  wrap.className = 'cvw absolute inset-0';

  if (card.isPlaceholder) {
    const pi = card.pairId % PH.length;
    wrap.innerHTML = PH[pi];
    const sv = wrap.querySelector('svg');
    if (sv) { sv.setAttribute('width','100%'); sv.setAttribute('height','100%'); }
    back.insertBefore(wrap, back.firstChild);
    return;
  }

  const uid = card.participantUid;
  if (uid === S.myUid && S.localVideo) {
    playTrack(S.localVideo, wrap);
  } else {
    const rem = S.remoteUsers[uid];
    if (rem?.videoTrack) {
      playTrack(rem.videoTrack, wrap);
    } else {
      wrap.className += ' flex items-center justify-center bg-surface-container';
      wrap.innerHTML = `<span class="material-symbols-outlined ms text-on-surface-variant" style="font-size:28px">person</span>`;
    }
  }
  back.insertBefore(wrap, back.firstChild);
}

function renderAllVideos() {
  S.cards.forEach((card, idx) => {
    const back = g('card-back-' + idx);
    if (back) renderVideoForCard(card, back);
  });
}

// Only re-render video for specific cards (fix #5)
function renderVideosForIndices(indices) {
  indices.forEach(idx => {
    const back = g('card-back-' + idx);
    if (back) renderVideoForCard(S.cards[idx], back);
  });
}

// ══════════════════════════════════════════════════════════════════
//  GAME LOGIC
// ══════════════════════════════════════════════════════════════════
function requestFlip(idx) {
  const card = S.cards[idx];
  if (!S.canFlip)          { toast("It's not your turn!"); return; }
  if (!S.gameStarted)      { toast('Game not started yet'); return; }
  if (card.flipped || card.matched) return;
  if (S.flipped.length >= 2 || S.flipLock) return;

  if (S.isHost) {
    hostFlip(idx);
  } else {
    // Optimistic visual: mark card as pending while waiting for host (fix #7)
    S.pendingIdx = idx;
    g('card-' + idx)?.classList.add('card-pending');
    broadcast({ type:'FLIP_REQUEST', cardIdx:idx, uid:S.myUid });
  }
}

function clearPending() {
  if (S.pendingIdx >= 0) {
    g('card-' + S.pendingIdx)?.classList.remove('card-pending');
    S.pendingIdx = -1;
  }
}

function hostFlip(idx) {
  broadcast({ type:'CARD_FLIPPED', cardIdx:idx });
  applyFlip(idx);
}

function applyFlip(idx) {
  const card = S.cards[idx];
  if (!card || card.matched) return;
  // First flip cancels the turn timer and countdown bar (change #3)
  if (S.flipped.length === 0) {
    stopCountdown();
    if (S.isHost) { clearTimeout(S.turnTimer); S.turnTimer = null; }
  }
  card.flipped = true;
  S.flipped.push(idx);

  const inner = g('card-' + idx)?.querySelector('.card-inner');
  if (inner) inner.classList.add('flipped');

  // Only render video for this specific card (fix #5)
  const back = g('card-back-' + idx);
  if (back) renderVideoForCard(card, back);

  if (S.flipped.length === 2) {
    S.flipLock = true;
    S.canFlip  = false;
    if (S.isHost) {
      // Cancel any stale no-match timer before checking (fix #4)
      clearTimeout(S.noMatchTimer);
      S.noMatchTimer = null;
      setTimeout(() => hostCheckMatch(), 1100);
    }
  }
}

// ── Turn timer (change #3) ────────────────────────────────────────
// Starts after each turn begins. If no first card flipped in 10s,
// host advances the turn. Cancelled the moment first card is flipped.
function hostStartTurnTimer() {
  if (!S.isHost) return;
  clearTimeout(S.turnTimer);
  S.turnTimer = setTimeout(() => {
    S.turnTimer = null;
    if (!S.gameStarted || S.flipped.length > 0 || S.flipLock) return;
    const next = (S.turnIdx + 1) % Math.max(S.players.length, 1);
    toast('⏱ Turn skipped — too slow!');
    broadcast({ type:'TURN_SKIP', next });
    applyTurnSkip(next);
  }, 10000);
}

function applyTurnSkip(next) {
  S.flipped = []; S.flipLock = false;
  S.turnIdx = next;
  S.canFlip = S.myUid === S.players[next]?.uid;
  updateTurnBanner();
  startCountdown();
  if (S.isHost) hostStartTurnTimer();
}

function hostCheckMatch() {
  if (S.flipped.length < 2) return; // guard against race
  const [i1, i2] = S.flipped;
  const c1 = S.cards[i1], c2 = S.cards[i2];
  const cur = S.players[S.turnIdx];

  if (c1.pairId === c2.pairId) {
    // Match — same player keeps turn
    broadcast({ type:'MATCH', i1, i2, scorer:cur?.uid, next:S.turnIdx });
    applyMatch(i1, i2, cur?.uid, S.turnIdx);
    if (S.cards.every(c => c.matched)) {
      setTimeout(() => {
        broadcast({ type:'GAME_OVER', scores:S.scores });
        endGame(S.scores);
      }, 500);
    }
  } else {
    // No match — next player (fix #8: skip spectators — players[] has no spectators)
    const next = (S.turnIdx + 1) % Math.max(S.players.length, 1);
    broadcast({ type:'NO_MATCH', i1, i2, next });
    applyNoMatch(i1, i2, next);
  }
}

function applyMatch(i1, i2, scorerUid, next) {
  S.cards[i1].matched = true;
  S.cards[i2].matched = true;
  if (scorerUid && S.scores[scorerUid]) S.scores[scorerUid].pairs++;

  [i1, i2].forEach(i => {
    g('card-' + i)?.querySelector('.card-inner')?.classList.add('card-matched');
    g('card-back-' + i)?.classList.add('border-2', 'border-primary');
    // Remove click handler
    g('card-' + i)?.querySelector('.card-front')?.removeAttribute('onclick');
  });

  S.flipped = []; S.flipLock = false;
  S.turnIdx = next;
  S.canFlip = S.myUid === S.players[next]?.uid;

  if (scorerUid === S.myUid) { bumpScore(); toast('✨ Match! +1 Pair'); }
  updateScores(); updateHeaderScore(); updateCardsLeft(); updateTurnBanner();
  if (S.isHost && !S.cards.every(c => c.matched)) hostStartTurnTimer();
}

function applyNoMatch(i1, i2, next) {
  // Fix #4: store timer ref so it can be cancelled on reset
  S.noMatchTimer = setTimeout(() => {
    S.noMatchTimer = null;
    if (S.cards[i1]) S.cards[i1].flipped = false;
    if (S.cards[i2]) S.cards[i2].flipped = false;
    [i1, i2].forEach(i => g('card-' + i)?.querySelector('.card-inner')?.classList.remove('flipped'));
    S.flipped = []; S.flipLock = false;
    S.turnIdx = next;
    S.canFlip = S.myUid === S.players[next]?.uid;
    updateTurnBanner();
    if (S.isHost) hostStartTurnTimer();
  }, 750);
}

// ══════════════════════════════════════════════════════════════════
//  RTC EVENTS
// ══════════════════════════════════════════════════════════════════
function setupRtcEvents() {
  S.rtcClient.on('user-published', async (user, mt) => {
    await S.rtcClient.subscribe(user, mt);
    const uid = user.uid;
    if (!S.remoteUsers[uid]) S.remoteUsers[uid] = { user, videoTrack:null, audioTrack:null };
    if (mt === 'video') { S.remoteUsers[uid].videoTrack = user.videoTrack; }
    if (mt === 'audio') { S.remoteUsers[uid].audioTrack = user.audioTrack; user.audioTrack.play(); }
    // Only re-render cards belonging to this user (fix #5)
    const indices = S.cards.reduce((acc, c, i) => { if (String(c.participantUid) === String(uid)) acc.push(i); return acc; }, []);
    if (indices.length) renderVideosForIndices(indices);
  });

  S.rtcClient.on('user-unpublished', (user, mt) => {
    if (S.remoteUsers[user.uid]) {
      if (mt === 'video') S.remoteUsers[user.uid].videoTrack = null;
      if (mt === 'audio') S.remoteUsers[user.uid].audioTrack = null;
    }
  });

  S.rtcClient.on('user-left', user => { delete S.remoteUsers[user.uid]; });
}

// ══════════════════════════════════════════════════════════════════
//  PEER LEFT  (fix #3: detect host departure)
// ══════════════════════════════════════════════════════════════════
function onPeerLeft(uid) {
  // Check if the leaver was the host (first player to join = players[0] at game start)
  // We don't track hostUid explicitly, but we can warn if the game was running
  const wasInPlayers = S.players.findIndex(p => p.uid === uid);
  const inAll = S.allUsers.findIndex(u => u.uid === uid);

  if (inAll >= 0) {
    const name = S.allUsers[inAll].name;
    S.allUsers.splice(inAll, 1);
    toast(name + ' left');
  }
  if (wasInPlayers >= 0) {
    S.players.splice(wasInPlayers, 1);
    // Adjust turn index
    if (S.turnIdx >= S.players.length) S.turnIdx = 0;
    S.canFlip = S.myUid === S.players[S.turnIdx]?.uid;
    // If we are the new first player after host left, we become host
    if (!S.isHost && S.players[0]?.uid === S.myUid) {
      S.isHost = true;
      toast('⚠️ Host left — you are now the host');
      rtmDot('connected');
    }
    updateTurnBanner();
  } else {
    S.spectators = S.spectators.filter(p => p.uid !== uid);
  }
  updatePlayersList(); updateScores();
  if (S.isHost) refreshWaitingList();
}

// ══════════════════════════════════════════════════════════════════
//  END GAME / RESET
// ══════════════════════════════════════════════════════════════════
function endGame(scores) {
  clearInterval(S.timerInterval);
  if (scores) S.scores = scores; // sync from host's authoritative scores
  const sorted = Object.entries(S.scores).sort((a, b) => b[1].pairs - a[1].pairs);
  const ov = document.createElement('div');
  ov.id = 'game-over-overlay';
  ov.className = 'fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center fade-in';
  ov.innerHTML = `
    <div class="bg-surface-container border border-outline-variant rounded-2xl p-8 max-w-sm w-full mx-4 text-center slide-up">
      <div class="text-5xl mb-3">🏆</div>
      <h2 class="font-headline font-black text-2xl text-tertiary uppercase mb-1">Game Over!</h2>
      <p class="text-on-surface-variant text-sm mb-5">All pairs found</p>
      <div class="space-y-2 mb-6">
        ${sorted.slice(0,5).map((e,i) => `
          <div class="flex justify-between items-center px-4 py-2 rounded-xl ${i===0?'bg-tertiary-container text-on-tertiary':'bg-surface-container-high text-on-surface'}">
            <span class="font-bold text-sm">${['🥇','🥈','🥉','4.','5.'][i]} ${e[1].name}</span>
            <span class="font-black text-sm">${e[1].pairs} pairs</span>
          </div>`).join('')}
      </div>
      ${S.isHost
        ? `<button onclick="this.closest('.fixed').remove();hostReset();"
            class="w-full py-3 bg-gradient-to-r from-primary to-primary-container text-on-primary font-black rounded-xl uppercase tracking-wider text-sm">Play Again</button>`
        : `<p class="text-on-surface-variant text-sm">Waiting for host to restart…</p>`}
    </div>`;
  document.body.appendChild(ov);
}

function hostReset() {
  if (!S.isHost) return;
  clearTimeout(S.noMatchTimer); S.noMatchTimer = null;
  clearTimeout(S.turnTimer);    S.turnTimer    = null;

  // Winner of last round starts next; preserve relative order after (change #2)
  const sorted = Object.entries(S.scores).sort((a, b) => b[1].pairs - a[1].pairs);
  const winnerUid = sorted[0]?.[0];
  const winnerIdx = S.players.findIndex(p => p.uid === winnerUid);
  if (winnerIdx > 0) {
    S.players = [...S.players.slice(winnerIdx), ...S.players.slice(0, winnerIdx)];
  }
  S.turnIdx = 0;

  S.boardSeed = Date.now();
  Object.keys(S.scores).forEach(u => S.scores[u].pairs = 0);
  S.flipped = []; S.flipLock = false;
  buildBoard(); renderBoard();
  document.getElementById('game-over-overlay')?.remove();
  updateScores(); updateTurnBanner(); updateHeaderScore();
  startTimer();
  hostStartTurnTimer();
  broadcast({ type:'RESET', seed:S.boardSeed, players:S.players, spectators:S.spectators });
}

function applyReset(m) {
  clearTimeout(S.noMatchTimer); S.noMatchTimer = null;
  clearTimeout(S.turnTimer);    S.turnTimer    = null;
  S.boardSeed = m.seed;
  if (m.players)    S.players    = m.players;    // already winner-rotated by host
  if (m.spectators) S.spectators = m.spectators;
  Object.keys(S.scores).forEach(u => S.scores[u].pairs = 0);
  S.turnIdx = 0; S.flipped = []; S.flipLock = false;
  buildBoard(); renderBoard();
  document.getElementById('game-over-overlay')?.remove();
  S.canFlip = S.myUid === S.players[0]?.uid;
  updateScores(); updateTurnBanner(); updateHeaderScore();
  startTimer();
}

// ══════════════════════════════════════════════════════════════════
//  UI UPDATES
// ══════════════════════════════════════════════════════════════════
function updateTurnBanner() {
  const ban = g('turn-banner'), tt = g('turn-text'), ts = g('turn-sub');
  if (!ban) return;
  if (!S.gameStarted) {
    tt.textContent = 'Waiting for host…'; ts.textContent = 'Game will start soon';
    ban.className = 'mb-3 rounded-xl px-4 py-2.5 flex items-center justify-between bg-surface-container text-on-surface-variant flex-shrink-0';
    return;
  }
  if (!S.players.length) { tt.textContent = 'No players'; ts.textContent = '—'; return; }
  const cur = S.players[S.turnIdx];
  if (!cur) return;
  const me = cur.uid === S.myUid;
  tt.textContent = me ? '⚡ YOUR TURN' : cur.name.toUpperCase() + "'S TURN";
  ts.textContent = me ? 'Click two cards to find a match!' : 'Watch and wait…';
  ban.className = 'mb-3 rounded-xl px-4 py-2.5 flex flex-wrap items-center justify-between flex-shrink-0 '
    + (me ? 'turn-pulse bg-tertiary-container text-on-tertiary' : 'bg-surface-container text-on-surface-variant');
  startCountdown();
}

function updateCardsLeft() {
  const rem = S.cards.filter(c => !c.matched).length / 2;
  const tot = S.cards.length / 2;
  const el = g('cards-left');
  if (el) el.textContent = rem + '/' + tot + ' pairs left';
}

function updateScores() {
  const panel = g('sp-scores');
  if (!panel) return;
  const sorted = Object.entries(S.scores).sort((a, b) => b[1].pairs - a[1].pairs);
  panel.innerHTML = sorted.map((e, i) => {
    const me  = e[0] === S.myUid;
    const cur = S.players[S.turnIdx]?.uid === e[0];
    return `<div class="flex items-center justify-between px-3 py-2.5 rounded-xl ${me ? 'bg-primary/10 border border-primary/20' : 'hover:bg-surface-container-high'} transition-colors">
      <div class="flex items-center gap-2.5">
        <div class="w-6 h-6 rounded-full ${me ? 'bg-primary text-on-primary' : 'bg-surface-container-highest text-on-surface-variant'} flex items-center justify-center text-[10px] font-black">${i+1}</div>
        <div>
          <div class="text-xs font-bold ${me ? 'text-primary' : 'text-on-surface'}">${e[1].name}${me ? ' (You)' : ''}</div>
          ${cur ? '<div class="text-[9px] text-tertiary font-bold">● PLAYING</div>' : ''}
        </div>
      </div>
      <span class="text-xs font-black ${me ? 'text-primary' : 'text-on-surface-variant'}">${e[1].pairs}</span>
    </div>`;
  }).join('');
}

function updatePlayersList() {
  const panel = g('sp-players');
  if (!panel) return;
  panel.innerHTML = S.allUsers.map(u => `
    <div class="flex items-center gap-3 px-3 py-2 rounded-xl hover:bg-surface-container-high transition-colors">
      <div class="w-8 h-8 rounded-full bg-surface-container-highest flex items-center justify-center text-xs text-on-surface-variant font-bold flex-shrink-0">${u.name.slice(0,2).toUpperCase()}</div>
      <div class="flex-1 min-w-0">
        <div class="text-xs font-bold text-on-surface truncate">${u.name}${u.uid===S.myUid?' (You)':''}</div>
        <div class="text-[9px] text-on-surface-variant uppercase tracking-wider">${u.isSpectator ? '👁 Spectator' : '🎥 Player'}</div>
      </div>
    </div>`).join('');
}

function updateHeaderScore() {
  const my = S.scores[S.myUid];
  const el = g('header-score');
  if (my && el) el.textContent = my.pairs + ' pairs';
}

function bumpScore() {
  updateHeaderScore();
  const el = g('header-score');
  if (el) { el.classList.remove('score-bump'); void el.offsetWidth; el.classList.add('score-bump'); }
  setTimeout(() => g('header-score')?.classList.remove('score-bump'), 320);
}

function showPanel(p) {
  g('sp-scores').classList.toggle('hidden', p !== 'scores');
  g('sp-players').classList.toggle('hidden', p !== 'players');
  const on  = 'flex-1 py-2.5 text-xs font-bold uppercase tracking-widest text-primary border-b-2 border-primary';
  const off = 'flex-1 py-2.5 text-xs font-bold uppercase tracking-widest text-on-surface-variant';
  g('sp-s-btn').className = p === 'scores'  ? on : off;
  g('sp-p-btn').className = p === 'players' ? on : off;
}

let sidebarOpen = true;
function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  const sb = g('sidebar');
  sb.style.width    = sidebarOpen ? '' : '0';
  sb.style.overflow = sidebarOpen ? '' : 'hidden';
}

//  SCREEN MANAGEMENT
// ══════════════════════════════════════════════════════════════════
function showScreen(name) {
  g('lobby-screen').classList.toggle('hidden', name !== 'lobby');
  g('waiting-screen').classList.toggle('hidden', name !== 'waiting');
  g('game-screen').classList.toggle('hidden', name !== 'game');
}

// ══════════════════════════════════════════════════════════════════
//  TIMER
// ══════════════════════════════════════════════════════════════════
function startTimer() {
  clearInterval(S.timerInterval);
  S.timerStart = Date.now();
  S.timerInterval = setInterval(() => {
    const s = Math.floor((Date.now() - S.timerStart) / 1000);
    const el = g('header-timer');
    if (el) el.textContent = String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
  }, 1000);
}

async function toggleMic() {

async function toggleCamera() {

  if (S.localVideo) await S.localVideo.setEnabled(S.camOn);
  g('cam-icon').textContent = S.camOn ? 'videocam' : 'videocam_off';

// ── Visual countdown bar (runs on all clients) ───────────────────────
let _cdTimer = null;
function startCountdown() {
  stopCountdown();
  const bar = document.getElementById('turn-countdown-bar');
  const wrap = document.getElementById('turn-countdown');
  if (!bar || !wrap) return;
  wrap.classList.remove('hidden');
  bar.style.transition = 'none';
  bar.style.width = '100%';
  void bar.offsetWidth;
  // Animate to 0% over 10 seconds
  requestAnimationFrame(() => {
    bar.style.transition = 'width 10s linear';
    bar.style.width = '0%';
  });
  _cdTimer = setTimeout(() => stopCountdown(), 10200);
}
function stopCountdown() {
  clearTimeout(_cdTimer); _cdTimer = null;
  const bar = document.getElementById('turn-countdown-bar');
  const wrap = document.getElementById('turn-countdown');
  if (bar) { bar.style.transition = 'none'; bar.style.width = '100%'; }
  if (wrap) wrap.classList.add('hidden');
}

// ══════════════════════════════════════════════════════════════════
//  LEAVE  (fix #13: clean up cloned tracks)
// ══════════════════════════════════════════════════════════════════
async function leaveRoom() {
  clearInterval(S.timerInterval);
  clearTimeout(S.noMatchTimer);
  clearTimeout(S.turnTimer); S.turnTimer = null;
  stopCountdown();

  // Stop all cloned tracks still in the DOM (fix #13)
  document.querySelectorAll('video').forEach(v => {
    if (v._ct) try { v._ct.stop(); } catch(_) {}
  });

  if (S.localAudio)  { S.localAudio.close();  S.localAudio  = null; }
  if (S.localVideo)  { S.localVideo.close();  S.localVideo  = null; }

  if (S.rtmClient && S.rtmChannelName) {
    await S.rtmClient.unsubscribe(S.rtmChannelName).catch(() => {});
  }
  if (S.rtmClient) {
    await S.rtmClient.logout().catch(() => {});
    S.rtmClient = null;
    S.rtmChannelName = '';
  }
  if (S.rtcClient) {
    await S.rtcClient.leave().catch(() => {});
    S.rtcClient = null;
  }

  // Reset state
  Object.assign(S, {
    players:[], spectators:[], allUsers:[], remoteUsers:{},
    cards:[], positions:[], scores:{}, flipped:[],
    canFlip:false, flipLock:false, gameStarted:false, pendingIdx:-1,
  });

  showScreen('lobby');
  rtmDot('');
  toast('Left the room');
}

let chatOpen = false;
function toggleChat() {
  chatOpen = !chatOpen;

}

function sendChat() {
  const input = g('chat-input');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  appendChat(S.userName, msg, true);
  broadcast({ type:'CHAT', uid:S.myUid, name:S.userName, text:msg });
}

function appendChat(sender, text, isMe) {
  const c = g('chat-messages');
  const d = document.createElement('div');
  d.className = 'flex flex-col ' + (isMe ? 'items-end' : 'items-start');
  d.innerHTML = `<span class="text-[9px] text-on-surface-variant mb-0.5 font-bold uppercase tracking-wider">${sender}</span>
    <div class="px-3 py-1.5 rounded-xl text-xs max-w-[80%] ${isMe ? 'bg-primary text-on-primary' : 'bg-surface-container-high text-on-surface'}">${esc(text)}</div>`;
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
}

// ══════════════════════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════════════════════
const g = id => document.getElementById(id);
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toast(msg) {
  const t = g('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 3000);
}

function rtmDot(status) {
  const d = g('rtm-dot');
  if (d) { d.className = ''; if (status) d.classList.add(status); d.title = 'RTM: ' + status; }
}

function copyInvite() {
  const url = new URL(window.location.href.split('?')[0]);
  url.searchParams.set('room', S.channelName);
  url.searchParams.set('id', S.appId);
  if (S.token) url.searchParams.set('t', S.token);
  navigator.clipboard.writeText(url.toString()).then(() => toast('Invite link copied!'));
}

window.onbeforeunload = () => { if (S.rtcClient) return 'Leave the game?'; };

// ══════════════════════════════════════════════════════════════════
//  URL PARAM PREFILL
// ══════════════════════════════════════════════════════════════════
(function () {
  const p = new URLSearchParams(window.location.search);
  const room = p.get('room'), appId = p.get('id'), token = p.get('t');
  if (!room && !appId) return;
  setTab('join');
  if (room)  { const e = g('join-room');  if (e) e.value = room.toUpperCase(); }
  if (appId) { const e = g('join-appid'); if (e) e.value = appId; }
  if (token) { const e = g('join-token'); if (e) e.value = token; }
  const ne = g('join-name');
  if (ne) { ne.focus(); ne.placeholder = 'Enter your display name to join'; ne.classList.add('border-tertiary'); }
  const ban = document.createElement('div');
  ban.className = 'mb-4 px-4 py-2.5 rounded-xl bg-tertiary-container/30 border border-tertiary/40 text-on-tertiary text-xs font-bold text-center fade-in';
  ban.textContent = '🐝 You were invited to ' + (room || 'a room') + ' — enter your name to join!';
  const fj = g('form-join');
  if (fj) fj.insertBefore(ban, fj.firstChild);
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Electric Sandbox — Memory Game</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.21.0.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

<script id="tailwind-config">
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "primary": "#97a9ff",
        "primary-dim": "#3e65ff",
        "primary-container": "#859aff",
        "on-primary": "#002283",
        "secondary": "#c57eff",
        "secondary-container": "#6a0baa",
        "on-secondary": "#340058",
        "tertiary": "#ffe484",
        "tertiary-container": "#fdd404",
        "on-tertiary": "#635200",
        "error": "#ff6e84",
        "error-container": "#a70138",
        "surface": "#0e0e10",
        "surface-dim": "#0e0e10",
        "surface-bright": "#2c2c2f",
        "surface-container": "#19191c",
        "surface-container-low": "#131315",
        "surface-container-high": "#1f1f22",
        "surface-container-highest": "#262528",
        "surface-variant": "#262528",
        "on-surface": "#f6f3f5",
        "on-surface-variant": "#acaaad",
        "background": "#0e0e10",
        "on-background": "#f6f3f5",
        "outline": "#767577",
        "outline-variant": "#48474a",
      },
      fontFamily: {
        "headline": ["Plus Jakarta Sans", "sans-serif"],
        "body": ["Space Grotesk", "sans-serif"],
      },
      borderRadius: {
        DEFAULT: "0.75rem",
        lg: "1.25rem",
        xl: "2rem",
        full: "9999px"
      },
      keyframes: {
        flip: {
          '0%': { transform: 'rotateY(0deg)' },
          '100%': { transform: 'rotateY(180deg)' }
        },
        unflip: {
          '0%': { transform: 'rotateY(180deg)' },
          '100%': { transform: 'rotateY(0deg)' }
        },
        pulseGlow: {
          '0%, 100%': { boxShadow: '0 0 10px rgba(253,212,4,0.3)' },
          '50%': { boxShadow: '0 0 30px rgba(253,212,4,0.8), 0 0 60px rgba(253,212,4,0.3)' }
        },
        matchBurst: {
          '0%': { transform: 'scale(1)', opacity: '1' },
          '50%': { transform: 'scale(1.15)', opacity: '1' },
          '100%': { transform: 'scale(1)', opacity: '1' }
        },
        slideUp: {
          '0%': { transform: 'translateY(30px)', opacity: '0' },
          '100%': { transform: 'translateY(0)', opacity: '1' }
        },
        fadeIn: {
          '0%': { opacity: '0' },
          '100%': { opacity: '1' }
        }
      }
    }
  }
}
</script>

<style>
* { box-sizing: border-box; }
.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
.fill-icon { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

/* Card 3D flip */
.card-scene { perspective: 600px; }
.card-inner {
  position: relative; width: 100%; height: 100%;
  transform-style: preserve-3d;
  transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}
.card-inner.flipped { transform: rotateY(180deg); }
.card-front, .card-back {
  position: absolute; inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: 0.625rem;
  overflow: hidden;
}
.card-front { background: #1f1f22; }
.card-back { transform: rotateY(180deg); background: #000; }

/* Matched card glow */
.card-matched .card-back { box-shadow: 0 0 20px rgba(151,169,255,0.6), inset 0 0 20px rgba(151,169,255,0.1); }
.card-matched .card-inner { animation: matchBurst 0.4s ease; }
@keyframes matchBurst { 0%{transform:rotateY(180deg) scale(1)} 50%{transform:rotateY(180deg) scale(1.12)} 100%{transform:rotateY(180deg) scale(1)} }

/* Turn indicator pulse */
.turn-pulse { animation: pulseGlow 2s ease-in-out infinite; }
@keyframes pulseGlow { 0%,100%{box-shadow:0 0 10px rgba(253,212,4,0.3)} 50%{box-shadow:0 0 30px rgba(253,212,4,0.7),0 0 60px rgba(253,212,4,0.2)} }

/* Slide up animation */
.slide-up { animation: slideUp 0.5s ease forwards; }
@keyframes slideUp { 0%{transform:translateY(30px);opacity:0} 100%{transform:translateY(0);opacity:1} }

/* Fade in */
.fade-in { animation: fadeIn 0.4s ease forwards; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

/* Custom scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #48474a; border-radius: 9999px; }

/* Video container */
.video-container video { width: 100%; height: 100%; object-fit: cover; }
.video-container { background: #000; }

/* Notification toast */
#toast {
  position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: #262528; border: 1px solid #48474a; color: #f6f3f5;
  padding: 0.75rem 1.5rem; border-radius: 9999px; font-family: 'Space Grotesk', sans-serif;
  font-weight: 600; font-size: 0.875rem; opacity: 0;
  transition: all 0.3s ease; pointer-events: none; z-index: 1000; white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Lobby screen */
#lobby-screen { position: fixed; inset: 0; z-index: 200; background: #0e0e10; }

/* Score badge */
.score-badge { transition: transform 0.2s ease; }
.score-badge.bump { animation: scoreBump 0.3s ease; }
@keyframes scoreBump { 0%{transform:scale(1)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }

/* Spectator badge */
.spectator-badge {
  position: absolute; top: 2px; right: 2px;
  background: rgba(197,126,255,0.9); border-radius: 4px;
  font-size: 9px; font-weight: 700; color: #340058;
  padding: 1px 4px; text-transform: uppercase;
}

/* Chat panel */
#chat-panel {
  position: fixed; right: 0; bottom: 90px; width: 288px;
  background: #131315; border: 1px solid #262528;
  border-radius: 1rem 1rem 0 0; z-index: 60;
  transform: translateY(100%); transition: transform 0.3s ease;
  max-height: 400px; display: flex; flex-direction: column;
}
#chat-panel.open { transform: translateY(0); }

/* Grid board */
.board-grid {
  display: grid;
  gap: 0.375rem;
}

/* Lobby gradient bg */
.lobby-bg {
  background: radial-gradient(ellipse at 30% 20%, rgba(151,169,255,0.12) 0%, transparent 60%),
              radial-gradient(ellipse at 70% 80%, rgba(197,126,255,0.1) 0%, transparent 60%),
              #0e0e10;
}
</style>
</head>
<body class="bg-background text-on-surface font-body overflow-hidden h-screen">

<!-- ═══════════════════════════════════════════════ LOBBY SCREEN ═══ -->
<div id="lobby-screen" class="lobby-bg flex items-center justify-center">
  <div class="w-full max-w-md px-6 slide-up">
    <!-- Logo -->
    <div class="text-center mb-10">
      <div class="text-4xl font-black text-primary italic uppercase tracking-wider font-headline mb-2">
        ⚡ Electric Sandbox
      </div>
      <p class="text-on-surface-variant text-sm">Video Memory Game · Meet & Match</p>
    </div>

    <!-- Tabs -->
    <div class="flex bg-surface-container rounded-xl p-1 mb-6">
      <button id="tab-join" onclick="setTab('join')"
        class="flex-1 py-2.5 text-sm font-bold rounded-lg transition-all duration-200 bg-surface-bright text-on-surface">
        Join Room
      </button>
      <button id="tab-create" onclick="setTab('create')"
        class="flex-1 py-2.5 text-sm font-bold rounded-lg transition-all duration-200 text-on-surface-variant">
        Create Room
      </button>
    </div>

    <!-- JOIN FORM -->
    <div id="form-join" class="space-y-4">
      <div>
        <label class="text-xs uppercase tracking-widest text-on-surface-variant font-bold block mb-1.5">Your Name</label>
        <input id="join-name" type="text" placeholder="e.g. Alex M."
          class="w-full bg-surface-container border border-outline-variant rounded-xl px-4 py-3 text-on-surface placeholder-on-surface-variant/50 focus:outline-none focus:border-primary transition-colors" />
      </div>
      <div>
        <label class="text-xs uppercase tracking-widest text-on-surface-variant font-bold block mb-1.5">Room Code</label>
        <input id="join-room" type="text" placeholder="e.g. ALPHA-ONE"
          class="w-full bg-surface-container border border-outline-variant rounded-xl px-4 py-3 text-on-surface placeholder-on-surface-variant/50 focus:outline-none focus:border-primary transition-colors uppercase" />
      </div>
      <div>
        <label class="text-xs uppercase tracking-widest text-on-surface-variant font-bold block mb-1.5">Agora App ID</label>
        <input id="join-appid" type="text" placeholder="Your Agora App ID"
          class="w-full bg-surface-container border border-outline-variant rounded-xl px-4 py-3 text-on-surface placeholder-on-surface-variant/50 focus:outline-none focus:border-primary transition-colors font-mono text-sm" />
      </div>
      <div>
        <label class="text-xs uppercase tracking-widest text-on-surface-variant font-bold block mb-1.5">Token (optional)</label>
        <input id="join-token" type="text" placeholder="Leave blank if not using token auth"
          class="w-full bg-surface-container border border-outline-variant rounded-xl px-4 py-3 text-on-surface placeholder-on-surface-variant/50 focus:outline-none focus:border-primary transition-colors font-mono text-sm" />
      </div>
      <button onclick="joinRoom()"
        class="w-full py-3.5 bg-gradient-to-r from-primary to-primary-container text-on-primary font-black rounded-xl uppercase tracking-wider text-sm hover:scale-[1.02] active:scale-[0.98] transition-transform shadow-lg shadow-primary/20 mt-2">
        ⚡ Join Game
      </button>
    </div>

    <!-- CREATE FORM -->
    <div id="form-create" class="space-y-4 hidden">
      <div>
        <label class="text-xs uppercase tracking-widest text-on-surface-variant font-bold block mb-1.5">Your Name</label>
        <input id="create-name" type="text" placeholder="e.g. Host Alex"
          class="w-full bg-surface-container border border-outline-variant rounded-xl px-4 py-3 text-on-surface placeholder-on-surface-variant/50 focus:outline-none focus:border-primary transition-colors" />
      </div>
      <div>
        <label class="text-xs uppercase tracking-widest text-on-surface-variant font-bold block mb-1.5">Room Name</label>
        <input id="create-room" type="text" placeholder="e.g. ALPHA-ONE"
          class="w-full bg-surface-container border border-outline-variant rounded-xl px-4 py-3 text-on-surface placeholder-on-surface-variant/50 focus:outline-none focus:border-primary transition-colors uppercase" />
      </div>
      <div>
        <label class="text-xs uppercase tracking-widest text-on-surface-variant font-bold block mb-1.5">Agora App ID</label>
        <input id="create-appid" type="text" placeholder="Your Agora App ID"
          class="w-full bg-surface-container border border-outline-variant rounded-xl px-4 py-3 text-on-surface placeholder-on-surface-variant/50 focus:outline-none focus:border-primary transition-colors font-mono text-sm" />
      </div>
      <div>
        <label class="text-xs uppercase tracking-widest text-on-surface-variant font-bold block mb-1.5">Token (optional)</label>
        <input id="create-token" type="text" placeholder="Leave blank if not using token auth"
          class="w-full bg-surface-container border border-outline-variant rounded-xl px-4 py-3 text-on-surface placeholder-on-surface-variant/50 focus:outline-none focus:border-primary transition-colors font-mono text-sm" />
      </div>
      <div>
        <label class="text-xs uppercase tracking-widest text-on-surface-variant font-bold block mb-1.5">Max Video Players</label>
        <div class="flex gap-3">
          <button id="btn-max10" onclick="setMaxPlayers(10)"
            class="flex-1 py-2.5 rounded-xl text-sm font-bold border-2 border-primary bg-primary/10 text-primary transition-all">
            10 Players
          </button>
          <button id="btn-max20" onclick="setMaxPlayers(20)"
            class="flex-1 py-2.5 rounded-xl text-sm font-bold border-2 border-outline-variant text-on-surface-variant hover:border-primary hover:text-primary transition-all">
            20 Players
          </button>
        </div>
      </div>
      <button onclick="createRoom()"
        class="w-full py-3.5 bg-gradient-to-r from-secondary to-secondary-container text-white font-black rounded-xl uppercase tracking-wider text-sm hover:scale-[1.02] active:scale-[0.98] transition-transform shadow-lg shadow-secondary/20 mt-2">
        ⚡ Create Room
      </button>
    </div>

    <p class="text-center text-xs text-on-surface-variant mt-6 opacity-60">
      Requires Agora App ID · Real-time video powered by Agora SDK
    </p>
  </div>
</div>

<!-- ═══════════════════════════════════════════════ GAME SCREEN ═══ -->
<div id="game-screen" class="hidden h-screen flex flex-col">

  <!-- TOP BAR -->
  <header class="flex justify-between items-center px-5 py-3 bg-surface/80 backdrop-blur-xl border-b border-outline-variant/30 z-50 flex-shrink-0">
    <div class="text-xl font-black text-primary italic uppercase tracking-wider font-headline">⚡ ES</div>
    <nav class="flex items-center gap-5">
      <div class="text-xs font-bold uppercase tracking-widest text-primary border-b border-primary pb-0.5 font-headline" id="header-room">Room: —</div>
      <div class="text-xs text-on-surface-variant font-bold font-headline" id="header-timer">00:00</div>
      <div class="text-xs text-tertiary font-black font-headline score-badge" id="header-score">Score: 0</div>
    </nav>
    <div class="flex items-center gap-2">
      <button onclick="toggleSidebar()" class="text-primary hover:text-white hover:bg-surface-container-high rounded-full p-1.5 transition-all">
        <span class="material-symbols-outlined text-xl">leaderboard</span>
      </button>
      <button onclick="leaveRoom()" class="text-error hover:text-white hover:bg-error-container/30 rounded-full p-1.5 transition-all">
        <span class="material-symbols-outlined text-xl fill-icon">call_end</span>
      </button>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main class="flex flex-1 overflow-hidden">

    <!-- GAME AREA -->
    <section class="flex-1 flex flex-col overflow-hidden px-4 py-3">

      <!-- Turn Banner -->
      <div id="turn-banner" class="mb-3 rounded-xl px-5 py-3 turn-pulse flex items-center justify-between bg-tertiary-container text-on-tertiary flex-shrink-0">
        <div class="flex items-center gap-3">
          <span class="material-symbols-outlined text-2xl fill-icon">stars</span>
          <div>
            <div id="turn-text" class="font-headline font-black text-base uppercase tracking-tight">Waiting...</div>
            <div id="turn-sub" class="text-xs font-semibold opacity-70">Loading players...</div>
          </div>
        </div>
        <div id="cards-left" class="text-xs font-bold text-right opacity-70"></div>
      </div>

      <!-- Board -->
      <div class="flex-1 overflow-auto">
        <div id="board" class="board-grid"></div>
      </div>
    </section>

    <!-- SIDEBAR -->
    <aside id="sidebar" class="w-64 flex-shrink-0 bg-surface-container-low border-l border-outline-variant/30 flex flex-col overflow-hidden transition-all duration-300">
      <!-- Tabs -->
      <div class="flex border-b border-outline-variant/30">
        <button onclick="showSidePanel('scores')" id="sp-scores-btn"
          class="flex-1 py-2.5 text-xs font-bold uppercase tracking-widest text-primary border-b-2 border-primary">Scores</button>
        <button onclick="showSidePanel('players')" id="sp-players-btn"
          class="flex-1 py-2.5 text-xs font-bold uppercase tracking-widest text-on-surface-variant">Players</button>
      </div>

      <!-- Scores Panel -->
      <div id="sp-scores" class="flex-1 overflow-y-auto p-3 space-y-1">
        <!-- populated dynamically -->
      </div>

      <!-- Players Panel -->
      <div id="sp-players" class="flex-1 overflow-y-auto p-3 space-y-2 hidden">
        <!-- populated dynamically -->
      </div>

      <!-- Invite -->
      <div class="p-3 border-t border-outline-variant/30">
        <button onclick="copyRoomCode()" class="w-full py-2 bg-primary/10 border border-primary/30 rounded-xl text-primary text-xs font-bold uppercase tracking-wider hover:bg-primary/20 transition-colors">
          🔗 Copy Invite Link
        </button>
      </div>
    </aside>
  </main>

  <!-- BOTTOM CONTROLS -->
  <nav class="flex-shrink-0 flex justify-center items-center py-3 bg-surface/80 backdrop-blur-xl border-t border-outline-variant/30">
    <div class="flex items-center gap-3">
      <button id="btn-mic" onclick="toggleMic()"
        class="flex flex-col items-center p-3 rounded-xl hover:bg-surface-container-high transition-all group text-on-surface">
        <span id="mic-icon" class="material-symbols-outlined text-xl">mic</span>
        <span class="text-[9px] font-bold uppercase mt-0.5">Mic</span>
      </button>
      <button id="btn-cam" onclick="toggleCamera()"
        class="flex flex-col items-center p-3 rounded-xl hover:bg-surface-container-high transition-all group text-on-surface">
        <span id="cam-icon" class="material-symbols-outlined text-xl">videocam</span>
        <span class="text-[9px] font-bold uppercase mt-0.5">Camera</span>
      </button>
      <button onclick="toggleChat()"
        class="flex flex-col items-center p-3 rounded-xl bg-primary/10 border border-primary/30 transition-all group text-primary">
        <span class="material-symbols-outlined text-xl fill-icon">chat_bubble</span>
        <span class="text-[9px] font-bold uppercase mt-0.5">Chat</span>
      </button>
      <button onclick="toggleSidebar()"
        class="flex flex-col items-center p-3 rounded-xl hover:bg-surface-container-high transition-all group text-on-surface">
        <span class="material-symbols-outlined text-xl">groups</span>
        <span class="text-[9px] font-bold uppercase mt-0.5">Players</span>
      </button>
      <button onclick="leaveRoom()"
        class="flex flex-col items-center p-3 rounded-xl hover:bg-error-container/20 transition-all group text-error">
        <span class="material-symbols-outlined text-xl fill-icon">call_end</span>
        <span class="text-[9px] font-bold uppercase mt-0.5">Leave</span>
      </button>
    </div>
  </nav>
</div>

<!-- CHAT PANEL -->
<div id="chat-panel">
  <div class="flex items-center justify-between px-4 py-3 border-b border-outline-variant/30">
    <span class="font-bold text-sm">Chat</span>
    <button onclick="toggleChat()" class="text-on-surface-variant hover:text-on-surface"><span class="material-symbols-outlined text-lg">close</span></button>
  </div>
  <div id="chat-messages" class="flex-1 overflow-y-auto p-3 space-y-2 text-sm" style="min-height:200px;max-height:260px;"></div>
  <div class="p-3 border-t border-outline-variant/30 flex gap-2">
    <input id="chat-input" type="text" placeholder="Say something..."
      class="flex-1 bg-surface-container border border-outline-variant rounded-xl px-3 py-2 text-sm text-on-surface focus:outline-none focus:border-primary"
      onkeypress="if(event.key==='Enter') sendChat()" />
    <button onclick="sendChat()" class="bg-primary text-on-primary rounded-xl px-3 py-2 text-xs font-bold">Send</button>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- DECORATIVE BLUR ORBS -->
<div class="fixed top-1/2 -left-32 w-64 h-64 bg-primary/8 blur-[120px] rounded-full pointer-events-none z-0"></div>
<div class="fixed bottom-0 -right-24 w-80 h-80 bg-secondary/8 blur-[130px] rounded-full pointer-events-none z-0"></div>

<script>
// ═══════════════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════════════
const STATE = {
  appId: '',
  token: '',
  channelName: '',
  localUid: null,
  userName: '',
  maxVideoPlayers: 10,

  // Agora
  client: null,
  localAudioTrack: null,
  localVideoTrack: null,
  remoteUsers: {},   // uid -> { user, videoTrack, audioTrack, name }

  // Media state
  micOn: true,
  camOn: true,

  // Game
  participants: [],  // { uid, name, isPlaceholder, isSpectator }
  cards: [],         // { id, pairId, participantUid, flipped, matched }
  flippedCards: [],  // indices of currently flipped (not matched) cards
  currentTurnIdx: 0,
  scores: {},        // uid -> { name, pairs }
  myUid: null,
  canFlip: false,
  gameStarted: false,
  flipLock: false,

  // Timer
  timerStart: null,
  timerInterval: null,
};

// Placeholder avatar SVGs (5 different ones)
const PLACEHOLDERS = [
  `<svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"><rect width="60" height="60" fill="#1f1f22"/><circle cx="30" cy="22" r="12" fill="#48474a"/><ellipse cx="30" cy="50" rx="18" ry="12" fill="#48474a"/><text x="30" y="26" text-anchor="middle" fill="#acaaad" font-size="12" font-family="monospace">?</text></svg>`,
  `<svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"><rect width="60" height="60" fill="#19191c"/><circle cx="30" cy="22" r="12" fill="#3e65ff" opacity="0.5"/><ellipse cx="30" cy="50" rx="18" ry="12" fill="#3e65ff" opacity="0.3"/><text x="30" y="26" text-anchor="middle" fill="#97a9ff" font-size="10" font-family="monospace">★</text></svg>`,
  `<svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"><rect width="60" height="60" fill="#131315"/><circle cx="30" cy="22" r="12" fill="#6a0baa" opacity="0.6"/><ellipse cx="30" cy="50" rx="18" ry="12" fill="#6a0baa" opacity="0.4"/><text x="30" y="26" text-anchor="middle" fill="#c57eff" font-size="10" font-family="monospace">◆</text></svg>`,
  `<svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"><rect width="60" height="60" fill="#1a1508"/><circle cx="30" cy="22" r="12" fill="#635200" opacity="0.7"/><ellipse cx="30" cy="50" rx="18" ry="12" fill="#635200" opacity="0.5"/><text x="30" y="26" text-anchor="middle" fill="#ffe484" font-size="10" font-family="monospace">⚡</text></svg>`,
  `<svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"><rect width="60" height="60" fill="#1a0a0c"/><circle cx="30" cy="22" r="12" fill="#a70138" opacity="0.6"/><ellipse cx="30" cy="50" rx="18" ry="12" fill="#a70138" opacity="0.4"/><text x="30" y="26" text-anchor="middle" fill="#ff6e84" font-size="10" font-family="monospace">✦</text></svg>`,
];

// ═══════════════════════════════════════════════════════════
//  LOBBY UI
// ═══════════════════════════════════════════════════════════
let currentTab = 'join';
let selectedMaxPlayers = 10;

function setTab(tab) {
  currentTab = tab;
  document.getElementById('tab-join').className = tab === 'join'

}

function setMaxPlayers(n) {

function joinRoom() {

function createRoom() {

// ═══════════════════════════════════════════════════════════
//  AGORA SETUP
// ═══════════════════════════════════════════════════════════
async function startGame(userName, channelName, appId, token, maxPlayers) {
  STATE.appId = appId;
  STATE.token = token;
  STATE.channelName = channelName;
  STATE.userName = userName;
  STATE.maxVideoPlayers = maxPlayers;

  showToast('Connecting to ' + channelName + '...');

  try {
    STATE.client = AgoraRTC.createClient({ mode: 'rtc', codec: 'vp8' });
    setupAgoraEvents();

    STATE.localUid = await STATE.client.join(appId, channelName, token, null);
    STATE.myUid = STATE.localUid;

    // Create tracks
    [STATE.localAudioTrack, STATE.localVideoTrack] = await AgoraRTC.createMicrophoneAndCameraTracks();
    await STATE.client.publish([STATE.localAudioTrack, STATE.localVideoTrack]);

    // Add self as participant
    addParticipant(STATE.localUid, userName, false, false);

    // Switch to game screen
    document.getElementById('lobby-screen').classList.add('hidden');
    document.getElementById('game-screen').classList.remove('hidden');
    document.getElementById('header-room').textContent = 'Room: ' + channelName;

    // Start local video preview in a card once board is built
    initScores(STATE.localUid, userName);
    startTimer();

    // Build initial board with self
    rebuildBoard();
    updateTurnBanner();
    updateScorePanel();
    updatePlayersPanel();

    showToast('Joined ' + channelName + ' as ' + userName + '!');
  } catch (err) {
    console.error('Agora error:', err);
    showToast('Error: ' + (err.message || err));
  }
}

function setupAgoraEvents() {
  STATE.client.on('user-published', async (user, mediaType) => {
    await STATE.client.subscribe(user, mediaType);
    const uid = user.uid;

    if (!STATE.remoteUsers[uid]) STATE.remoteUsers[uid] = { user, videoTrack: null, audioTrack: null };
    STATE.remoteUsers[uid].user = user;

    if (mediaType === 'video') {
      STATE.remoteUsers[uid].videoTrack = user.videoTrack;
    }
    if (mediaType === 'audio') {
      STATE.remoteUsers[uid].audioTrack = user.audioTrack;
      user.audioTrack.play();
    }

    // Add participant if not known
    const currentVideoCount = STATE.participants.filter(p => !p.isPlaceholder && !p.isSpectator).length;
    const isSpectator = currentVideoCount >= STATE.maxVideoPlayers;
    const name = 'Player ' + String(uid).slice(-4);

    if (!STATE.participants.find(p => p.uid === uid)) {
      addParticipant(uid, name, false, isSpectator);
      initScores(uid, name);
    }

    rebuildBoard();
    renderVideoInCards();
    updateTurnBanner();
    updateScorePanel();
    updatePlayersPanel();
    showToast(name + (isSpectator ? ' joined (spectator)' : ' joined the game!'));
  });

  STATE.client.on('user-unpublished', (user, mediaType) => {
    if (STATE.remoteUsers[user.uid]) {
      if (mediaType === 'video') STATE.remoteUsers[user.uid].videoTrack = null;
      if (mediaType === 'audio') STATE.remoteUsers[user.uid].audioTrack = null;
    }
    renderVideoInCards();
  });

  STATE.client.on('user-left', (user) => {
    const uid = user.uid;
    delete STATE.remoteUsers[uid];
    const idx = STATE.participants.findIndex(p => p.uid === uid);
    if (idx !== -1) {
      const name = STATE.participants[idx].name;
      STATE.participants.splice(idx, 1);
      showToast(name + ' left the room');
    }
    rebuildBoard();
    renderVideoInCards();
    updateScorePanel();
    updatePlayersPanel();
    updateTurnBanner();
  });
}

// ═══════════════════════════════════════════════════════════
//  PARTICIPANTS & BOARD LOGIC
// ═══════════════════════════════════════════════════════════
function addParticipant(uid, name, isPlaceholder, isSpectator) {
  if (STATE.participants.find(p => p.uid === uid)) return;
  STATE.participants.push({ uid, name, isPlaceholder, isSpectator });
}

function initScores(uid, name) {
  if (!STATE.scores[uid]) STATE.scores[uid] = { name, pairs: 0 };
}

function rebuildBoard() {
  // Determine which participants get video cards
  const videoParticipants = STATE.participants.filter(p => !p.isSpectator && !p.isPlaceholder);
  const totalVideoSlots = STATE.maxVideoPlayers;
  const boardSize = totalVideoSlots; // each video player gets 2 cards = 2*N, fill rest with placeholders

  // We want exactly totalVideoSlots unique "sources" (real + placeholder), each appears twice
  const sources = [...videoParticipants];
  let phIdx = 0;
  while (sources.length < totalVideoSlots) {
    sources.push({ uid: 'ph_' + phIdx, name: 'Guest', isPlaceholder: true, isSpectator: false });
    phIdx++;
  }

  // Create pairs
  let cards = [];
  sources.forEach((src, i) => {
    cards.push({ id: i * 2,     pairId: i, participantUid: src.uid, isPlaceholder: src.isPlaceholder, name: src.name, flipped: false, matched: false });
    cards.push({ id: i * 2 + 1, pairId: i, participantUid: src.uid, isPlaceholder: src.isPlaceholder, name: src.name, flipped: false, matched: false });
  });

  // Preserve matched/flipped state from previous board
  const oldCards = STATE.cards;
  cards.forEach(c => {
    const old = oldCards.find(o => o.pairId === c.pairId && o.id === c.id);
    if (old) { c.flipped = old.flipped; c.matched = old.matched; }
  });

  // Shuffle only new cards (preserve positions where possible)
  const wasEmpty = STATE.cards.length === 0;
  if (wasEmpty) {
    shuffleArray(cards);
  }
  STATE.cards = cards;

  // Ensure currentTurnIdx is valid
  if (STATE.currentTurnIdx >= STATE.participants.length) STATE.currentTurnIdx = 0;
  STATE.canFlip = STATE.myUid === (STATE.participants[STATE.currentTurnIdx]?.uid);

  renderBoard();
}

function renderBoard() {
  const board = document.getElementById('board');
  const n = STATE.cards.length; // always 2*maxVideoPlayers
  const cols = STATE.maxVideoPlayers === 20 ? 8 : 6; // nice grid
  board.style.gridTemplateColumns = `repeat(${cols}, minmax(0, 1fr))`;

  board.innerHTML = '';
  STATE.cards.forEach((card, idx) => {
    const div = document.createElement('div');
    div.className = 'card-scene aspect-square';
    div.id = 'card-' + idx;

    const inner = document.createElement('div');
    inner.className = 'card-inner' + (card.flipped || card.matched ? ' flipped' : '') + (card.matched ? ' card-matched' : '');

    // Front (face-down)
    const front = document.createElement('div');
    front.className = 'card-front flex items-center justify-center cursor-pointer border border-primary/15 hover:border-primary/40 transition-colors';
    if (!card.matched) {
      front.onclick = () => flipCard(idx);
    }
    front.innerHTML = `<span class="material-symbols-outlined text-primary/25 text-2xl" style="font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24">electric_bolt</span>`;

    // Back (face-up, shows video or placeholder)
    const back = document.createElement('div');
    back.className = 'card-back video-container';
    back.id = 'card-back-' + idx;
    if (card.matched) {
      back.classList.add('border-2', 'border-primary');
    }

    // Name label
    const label = document.createElement('div');
    label.className = 'absolute bottom-1 left-1 bg-black/70 px-1.5 rounded text-[8px] font-bold text-white uppercase tracking-wide z-10';
    label.textContent = card.name.slice(0, 10);
    back.appendChild(label);

    // Spectator badge if applicable
    const participant = STATE.participants.find(p => p.uid === card.participantUid);
    if (participant?.isSpectator) {
      const badge = document.createElement('div');
      badge.className = 'spectator-badge';
      badge.textContent = 'Spec';
      back.appendChild(badge);
    }

    inner.appendChild(front);
    inner.appendChild(back);
    div.appendChild(inner);
    board.appendChild(div);
  });

  // Render videos after DOM is ready
  setTimeout(() => renderVideoInCards(), 50);
  updateCardsLeft();
}

// A single MediaStreamTrack can only be attached to one <video> at a time.
// To show the same stream in two cards we clone the underlying track and
// create an independent MediaStream for each card element.
function playTrackInContainer(agoraTrack, container) {
  const rawTrack = agoraTrack.getMediaStreamTrack ? agoraTrack.getMediaStreamTrack() : null;
  const video = document.createElement('video');
  video.autoplay = true;
  video.muted = true;
  video.playsInline = true;
  video.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;';
  if (rawTrack) {
    const cloned = rawTrack.clone();
    video.srcObject = new MediaStream([cloned]);
    video._clonedTrack = cloned; // keep reference so we can stop it later
  } else {
    // Fallback: let Agora manage a temporary div and steal its video element
    const tmp = document.createElement('div');
    tmp.style.display = 'none';
    document.body.appendChild(tmp);
    agoraTrack.play(tmp);
    const src = tmp.querySelector('video');
    if (src) video.srcObject = src.srcObject;
    document.body.removeChild(tmp);
  }
  container.appendChild(video);
  video.play().catch(() => {});
}

function renderVideoInCards() {
  STATE.cards.forEach((card, idx) => {
    const back = document.getElementById('card-back-' + idx);
    if (!back) return;

    // Stop any cloned tracks before wiping the DOM
    back.querySelectorAll('video').forEach(v => {
      if (v._clonedTrack) { try { v._clonedTrack.stop(); } catch(_) {} }
    });
    // Remove previous content wrappers (keep name label and spectator badge)
    back.querySelectorAll('.card-video-wrap').forEach(el => el.remove());

    const wrap = document.createElement('div');
    wrap.className = 'card-video-wrap absolute inset-0';

    if (card.isPlaceholder) {
      const phIdx = parseInt(card.pairId) % PLACEHOLDERS.length;
      wrap.innerHTML = PLACEHOLDERS[phIdx];
      const svg = wrap.querySelector('svg');
      if (svg) { svg.setAttribute('width', '100%'); svg.setAttribute('height', '100%'); }
      back.insertBefore(wrap, back.firstChild);
      return;
    }

    const uid = card.participantUid;

    if (uid === STATE.myUid && STATE.localVideoTrack) {
      playTrackInContainer(STATE.localVideoTrack, wrap);
      back.insertBefore(wrap, back.firstChild);
      return;
    }

    const remote = STATE.remoteUsers[uid];
    if (remote?.videoTrack) {
      playTrackInContainer(remote.videoTrack, wrap);
      back.insertBefore(wrap, back.firstChild);
    } else {
      wrap.className += ' flex items-center justify-center bg-surface-container';
      wrap.innerHTML = `<span class="material-symbols-outlined text-on-surface-variant text-3xl">person</span>`;
      back.insertBefore(wrap, back.firstChild);
    }
  });
}

// ═══════════════════════════════════════════════════════════
//  GAME LOGIC
// ═══════════════════════════════════════════════════════════
function flipCard(idx) {
  const card = STATE.cards[idx];
  if (!STATE.canFlip) { showToast("It's not your turn!"); return; }
  if (card.flipped || card.matched) return;
  if (STATE.flippedCards.length >= 2) return;
  if (STATE.flipLock) return;

  card.flipped = true;
  STATE.flippedCards.push(idx);

  const inner = document.getElementById('card-' + idx)?.querySelector('.card-inner');
  if (inner) inner.classList.add('flipped');
  renderVideoInCards();

  if (STATE.flippedCards.length === 2) {
    STATE.canFlip = false;
    STATE.flipLock = true;
    setTimeout(() => checkMatch(), 1000);
  }
}

function checkMatch() {
  const [i1, i2] = STATE.flippedCards;
  const c1 = STATE.cards[i1];
  const c2 = STATE.cards[i2];

  if (c1.pairId === c2.pairId) {
    // MATCH!
    c1.matched = true;
    c2.matched = true;
    const currentPlayer = STATE.participants[STATE.currentTurnIdx];
    if (currentPlayer) {
      if (!STATE.scores[currentPlayer.uid]) STATE.scores[currentPlayer.uid] = { name: currentPlayer.name, pairs: 0 };
      STATE.scores[currentPlayer.uid].pairs++;
    }
    // Add matched styling
    [i1, i2].forEach(i => {
      const inner = document.getElementById('card-' + i)?.querySelector('.card-inner');
      if (inner) inner.classList.add('card-matched');
      const back = document.getElementById('card-back-' + i);
      if (back) back.classList.add('border-2', 'border-primary');
    });

    STATE.flippedCards = [];
    STATE.flipLock = false;

    // Current player gets another turn
    STATE.canFlip = STATE.myUid === (STATE.participants[STATE.currentTurnIdx]?.uid);

    if (STATE.myUid === STATE.participants[STATE.currentTurnIdx]?.uid) {
      bumpScore();
      showToast('✨ Match! +1 Pair');
    }

    updateScorePanel();
    updateHeaderScore();
    updateCardsLeft();

    // Check win condition
    if (STATE.cards.every(c => c.matched)) {
      endGame();
      return;
    }
  } else {
    // NO match — flip back
    setTimeout(() => {
      c1.flipped = false;
      c2.flipped = false;
      [i1, i2].forEach(i => {
        const inner = document.getElementById('card-' + i)?.querySelector('.card-inner');
        if (inner) inner.classList.remove('flipped');
      });
      STATE.flippedCards = [];
      STATE.flipLock = false;

      // Next player's turn
      STATE.currentTurnIdx = (STATE.currentTurnIdx + 1) % Math.max(STATE.participants.length, 1);
      STATE.canFlip = STATE.myUid === (STATE.participants[STATE.currentTurnIdx]?.uid);
      updateTurnBanner();
    }, 600);
  }

  updateTurnBanner();
}

function updateTurnBanner() {
  const banner = document.getElementById('turn-banner');
  const turnText = document.getElementById('turn-text');
  const turnSub = document.getElementById('turn-sub');

  if (!STATE.participants.length) {
    turnText.textContent = 'Waiting for players...';
    turnSub.textContent = 'Invite friends to start';
    return;
  }

  const current = STATE.participants[STATE.currentTurnIdx];
  if (!current) return;

  const isMe = current.uid === STATE.myUid;
  if (isMe) {
    turnText.textContent = '⚡ YOUR TURN';
    turnSub.textContent = 'Click two cards to find a match!';
    banner.className = 'mb-3 rounded-xl px-5 py-3 turn-pulse flex items-center justify-between bg-tertiary-container text-on-tertiary flex-shrink-0';
  } else {
    turnText.textContent = current.name.toUpperCase() + "'S TURN";
    turnSub.textContent = 'Watch and wait...';
    banner.className = 'mb-3 rounded-xl px-5 py-3 flex items-center justify-between bg-surface-container text-on-surface-variant flex-shrink-0';
  }
}

function updateCardsLeft() {
  const remaining = STATE.cards.filter(c => !c.matched).length / 2;
  const total = STATE.cards.length / 2;
  const el = document.getElementById('cards-left');
  if (el) el.textContent = remaining + '/' + total + ' pairs left';
}

function endGame() {
  clearInterval(STATE.timerInterval);
  const sorted = Object.entries(STATE.scores).sort((a, b) => b[1].pairs - a[1].pairs);
  const winner = sorted[0];
  showToast('🏆 Game Over! Winner: ' + (winner ? winner[1].name : '—'));

  // Show victory overlay
  const overlay = document.createElement('div');
  overlay.className = 'fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center fade-in';
  overlay.innerHTML = `
    <div class="bg-surface-container border border-outline-variant rounded-2xl p-8 max-w-sm w-full mx-4 text-center slide-up">
      <div class="text-5xl mb-4">🏆</div>
      <h2 class="font-headline font-black text-2xl text-tertiary uppercase mb-1">Game Over!</h2>
      <p class="text-on-surface-variant text-sm mb-6">All pairs found</p>
      <div class="space-y-2 mb-6">
        ${sorted.slice(0, 5).map((e, i) => `
          <div class="flex justify-between items-center px-4 py-2 rounded-xl ${i === 0 ? 'bg-tertiary-container text-on-tertiary' : 'bg-surface-container-high text-on-surface'}">
            <span class="font-bold text-sm">${['🥇','🥈','🥉','4.','5.'][i]} ${e[1].name}</span>
            <span class="font-black text-sm">${e[1].pairs} pairs</span>
          </div>`).join('')}
      </div>
      <button onclick="this.closest('.fixed').remove(); resetGame();"
        class="w-full py-3 bg-gradient-to-r from-primary to-primary-container text-on-primary font-black rounded-xl uppercase tracking-wider text-sm">
        Play Again
      </button>
    </div>`;
  document.body.appendChild(overlay);
}

function resetGame() {
  // Reset scores, re-shuffle
  Object.keys(STATE.scores).forEach(uid => { STATE.scores[uid].pairs = 0; });
  STATE.currentTurnIdx = 0;
  STATE.flippedCards = [];
  STATE.flipLock = false;
  STATE.canFlip = STATE.myUid === STATE.participants[0]?.uid;
  STATE.timerStart = Date.now();
  STATE.cards.forEach(c => { c.flipped = false; c.matched = false; });
  shuffleArray(STATE.cards);
  // Re-assign IDs
  STATE.cards.forEach((c, i) => { c.id = i; });
  renderBoard();
  updateScorePanel();
  updateTurnBanner();
  updateHeaderScore();
}

// ═══════════════════════════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════════════════════════
function updateScorePanel() {
  const panel = document.getElementById('sp-scores');
  const sorted = Object.entries(STATE.scores).sort((a, b) => b[1].pairs - a[1].pairs);
  panel.innerHTML = sorted.map((e, i) => {
    const isMe = e[0] == STATE.myUid;
    const isCurrentTurn = STATE.participants[STATE.currentTurnIdx]?.uid == e[0];
    return `
      <div class="flex items-center justify-between px-3 py-2.5 rounded-xl ${isMe ? 'bg-primary/10 border border-primary/20' : 'hover:bg-surface-container-high'} transition-colors">
        <div class="flex items-center gap-2.5">
          <div class="w-6 h-6 rounded-full ${isMe ? 'bg-primary text-on-primary' : 'bg-surface-container-highest text-on-surface-variant'} flex items-center justify-center text-[10px] font-black">${i+1}</div>
          <div>
            <div class="text-xs font-bold ${isMe ? 'text-primary' : 'text-on-surface'}">${e[1].name}${isMe ? ' (You)' : ''}</div>
            ${isCurrentTurn ? '<div class="text-[9px] text-tertiary font-bold">● PLAYING</div>' : ''}
          </div>
        </div>
        <span class="text-xs font-black ${isMe ? 'text-primary' : 'text-on-surface-variant'}">${e[1].pairs}</span>
      </div>`;
  }).join('');
}

function updatePlayersPanel() {
  const panel = document.getElementById('sp-players');
  panel.innerHTML = STATE.participants.map(p => `
    <div class="flex items-center gap-3 px-3 py-2 rounded-xl hover:bg-surface-container-high transition-colors">
      <div class="w-8 h-8 rounded-full bg-surface-container-highest flex items-center justify-center text-xs text-on-surface-variant font-bold flex-shrink-0">
        ${p.name.slice(0, 2).toUpperCase()}
      </div>
      <div class="flex-1 min-w-0">
        <div class="text-xs font-bold text-on-surface truncate">${p.name}${p.uid == STATE.myUid ? ' (You)' : ''}</div>
        <div class="text-[9px] text-on-surface-variant uppercase tracking-wider">${p.isSpectator ? '👁 Spectator' : p.isPlaceholder ? '📷 Placeholder' : '🎥 Player'}</div>
      </div>
    </div>`).join('');
}

function updateHeaderScore() {
  const my = STATE.scores[STATE.myUid];
  const score = document.getElementById('header-score');
  if (my && score) score.textContent = 'Score: ' + my.pairs;
}

function bumpScore() {
  const el = document.getElementById('header-score');
  if (el) { el.classList.remove('bump'); void el.offsetWidth; el.classList.add('bump'); }
  updateHeaderScore();
  setTimeout(() => el?.classList.remove('bump'), 300);
}

function showSidePanel(panel) {
  document.getElementById('sp-scores').classList.toggle('hidden', panel !== 'scores');
  document.getElementById('sp-players').classList.toggle('hidden', panel !== 'players');
  document.getElementById('sp-scores-btn').className = panel === 'scores'
    ? 'flex-1 py-2.5 text-xs font-bold uppercase tracking-widest text-primary border-b-2 border-primary'
    : 'flex-1 py-2.5 text-xs font-bold uppercase tracking-widest text-on-surface-variant';
  document.getElementById('sp-players-btn').className = panel === 'players'
    ? 'flex-1 py-2.5 text-xs font-bold uppercase tracking-widest text-primary border-b-2 border-primary'
    : 'flex-1 py-2.5 text-xs font-bold uppercase tracking-widest text-on-surface-variant';
}

let sidebarVisible = true;
function toggleSidebar() {
  sidebarVisible = !sidebarVisible;
  const sidebar = document.getElementById('sidebar');
  sidebar.style.width = sidebarVisible ? '' : '0';
  sidebar.style.overflow = sidebarVisible ? '' : 'hidden';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timeout);
  t._timeout = setTimeout(() => t.classList.remove('show'), 3000);
}

function copyRoomCode() {
  const base = window.location.href.split('?')[0];
  const url = new URL(base);
  url.searchParams.set('room', STATE.channelName);
  url.searchParams.set('id', STATE.appId);
  if (STATE.token) url.searchParams.set('t', STATE.token);
  navigator.clipboard.writeText(url.toString()).then(() => showToast('Invite link copied!'));
}

// Timer
function startTimer() {
  STATE.timerStart = Date.now();
  STATE.timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - STATE.timerStart) / 1000);
    const m = Math.floor(elapsed / 60).toString().padStart(2, '0');
    const s = (elapsed % 60).toString().padStart(2, '0');
    const el = document.getElementById('header-timer');
    if (el) el.textContent = m + ':' + s;
  }, 1000);
}

// ═══════════════════════════════════════════════════════════
//  MEDIA CONTROLS
// ═══════════════════════════════════════════════════════════
async function toggleMic() {
  STATE.micOn = !STATE.micOn;
  if (STATE.localAudioTrack) await STATE.localAudioTrack.setEnabled(STATE.micOn);
  const icon = document.getElementById('mic-icon');
  const btn = document.getElementById('btn-mic');
  if (icon) icon.textContent = STATE.micOn ? 'mic' : 'mic_off';
  if (btn) btn.className = STATE.micOn
    ? 'flex flex-col items-center p-3 rounded-xl hover:bg-surface-container-high transition-all group text-on-surface'
    : 'flex flex-col items-center p-3 rounded-xl bg-error/10 border border-error/30 transition-all group text-error';
  showToast(STATE.micOn ? 'Microphone on' : 'Microphone off');
}

async function toggleCamera() {
  STATE.camOn = !STATE.camOn;
  if (STATE.localVideoTrack) await STATE.localVideoTrack.setEnabled(STATE.camOn);
  const icon = document.getElementById('cam-icon');
  const btn = document.getElementById('btn-cam');
  if (icon) icon.textContent = STATE.camOn ? 'videocam' : 'videocam_off';
  if (btn) btn.className = STATE.camOn
    ? 'flex flex-col items-center p-3 rounded-xl hover:bg-surface-container-high transition-all group text-on-surface'
    : 'flex flex-col items-center p-3 rounded-xl bg-error/10 border border-error/30 transition-all group text-error';
  showToast(STATE.camOn ? 'Camera on' : 'Camera off');
}

async function leaveRoom() {
  clearInterval(STATE.timerInterval);
  if (STATE.localAudioTrack) { STATE.localAudioTrack.close(); STATE.localAudioTrack = null; }
  if (STATE.localVideoTrack) { STATE.localVideoTrack.close(); STATE.localVideoTrack = null; }
  if (STATE.client) { await STATE.client.leave(); STATE.client = null; }
  STATE.participants = [];
  STATE.remoteUsers = {};
  STATE.cards = [];
  STATE.scores = {};
  document.getElementById('game-screen').classList.add('hidden');
  document.getElementById('lobby-screen').classList.remove('hidden');
  showToast('Left the room');
}

// ═══════════════════════════════════════════════════════════
//  CHAT
// ═══════════════════════════════════════════════════════════
let chatOpen = false;
function toggleChat() {
  chatOpen = !chatOpen;
  document.getElementById('chat-panel').classList.toggle('open', chatOpen);
}

function sendChat() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg) return;
  appendChat(STATE.userName, msg, true);
  input.value = '';
  // Broadcast via Agora RTM would go here; for now local only
}

function appendChat(sender, text, isMe) {
  const container = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'flex flex-col ' + (isMe ? 'items-end' : 'items-start');
  div.innerHTML = `
    <span class="text-[9px] text-on-surface-variant mb-0.5 font-bold uppercase tracking-wider">${sender}</span>
    <div class="px-3 py-1.5 rounded-xl text-xs max-w-[80%] ${isMe ? 'bg-primary text-on-primary' : 'bg-surface-container-high text-on-surface'}">${escapeHtml(text)}</div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ═══════════════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════════════
function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

// Resize board on window resize
window.addEventListener('resize', () => {
  if (STATE.cards.length) renderBoard();
});

// Prevent accidental navigation
window.onbeforeunload = () => {
  if (STATE.client) return 'Leave the game?';
};

// ═══════════════════════════════════════════════════════════
//  URL PARAM PREFILL
// ═══════════════════════════════════════════════════════════
(function readInviteParams() {
  const p = new URLSearchParams(window.location.search);
  const room  = p.get('room');
  const appId = p.get('id');
  const token = p.get('t');

  if (!room && !appId) return; // nothing to prefill

  // Switch to join tab and prefill fields
  setTab('join');
  if (room)  { const el = document.getElementById('join-room');  if (el) el.value = room.toUpperCase(); }
  if (appId) { const el = document.getElementById('join-appid'); if (el) el.value = appId; }
  if (token) { const el = document.getElementById('join-token'); if (el) el.value = token; }

  // Highlight the name field so the user knows what's left to fill
  const nameEl = document.getElementById('join-name');
  if (nameEl) {
    nameEl.focus();
    nameEl.placeholder = 'Enter your display name to join';
    nameEl.classList.add('border-tertiary');
  }

  // Show a banner explaining the prefill
  const banner = document.createElement('div');
  banner.className = 'mb-4 px-4 py-3 rounded-xl bg-tertiary-container/30 border border-tertiary/40 text-on-tertiary text-xs font-bold text-center fade-in';
  banner.textContent = '⚡ You were invited to ' + (room || 'a room') + ' — just enter your name and join!';
  const formJoin = document.getElementById('form-join');
  if (formJoin) formJoin.insertBefore(banner, formJoin.firstChild);
})();
</script>
